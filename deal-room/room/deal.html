<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Deal · Deal Room</title>
  <link rel="icon" type="image/svg+xml" href="../assets/images/Coat_of_arms_of_Nigeria.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.49.1/dist/apexcharts.min.js"></script>
  <link rel="stylesheet" href="../assets/css/custom.css" />
  <link rel="stylesheet" href="../assets/css/terminal.css" />
  <style>html:not(.is-ready) body{opacity:0}body{transition:opacity 180ms ease-out}</style>
</head>
<body>
  <div class="app-shell">
    <div data-workspace-shell data-active="deals"></div>

    <main class="workspace-content">
      <div id="dealRoot"></div>
    </main>
  </div>

  <script src="../assets/js/databank.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/terminal.js"></script>
  <script src="../assets/js/workspace.js"></script>
  <script src="../assets/js/dealflow.js"></script>
  <script>
    (function () {
      "use strict";
      const T = window.Terminal;
      const DF = window.DealFlow;
      const DB = window.DataBank;
      const api = DB.dealsApi();
      const positions = DB.positionsApi();
      const D = window.DataBankData;
      const root = document.getElementById("dealRoot");

      // Const tables hoisted to the top of the IIFE — referenced by hoisted helper functions
      // (renderV3 → renderBroadcastsPanel uses BROADCAST_CATEGORIES; renderV3 → renderAiPanel
      // → tokenize uses STOP_WORDS). If declared below the renderV3() call site, TDZ throws.
      const BROADCAST_CATEGORIES = [
        { id: "operational", label: "Operational",  color: "info"    },
        { id: "milestone",   label: "Milestone",    color: "success" },
        { id: "risk",        label: "Risk",         color: "danger"  },
        { id: "funding",     label: "Funding",      color: "warning" },
        { id: "other",       label: "Other",        color: "muted"   }
      ];
      const STOP_WORDS = { the:1, a:1, an:1, is:1, are:1, of:1, to:1, in:1, on:1, for:1, this:1, that:1, what:1, how:1, when:1, where:1, why:1, who:1, you:1, your:1, i:1, it:1, with:1, and:1, or:1, do:1, does:1, did:1, can:1, will:1, "?":1 };
      // Session-scoped Q&A history for the AI assistant. Hoisted to avoid TDZ when renderV3
      // (hoisted function declaration) calls renderAiPanel which reads this array.
      const _aiHistory = [];
      // Active tab on the countersign queue panel — Pending / Accepted / Declined.
      let _csTab = "pending";

      const params = new URLSearchParams(location.search);
      const id = params.get("id");
      // Look up the deal: user-created first (dealsApi), then fall back to seeded D.deals.
      let deal = id ? api.get(id) : null;
      if (!deal && id) {
        const seeded = D.deals.find(function (x) { return x.id === id; });
        if (seeded) deal = Object.assign({}, seeded);
      }

      if (!deal) {
        root.innerHTML = (
          '<div class="t-empty" style="margin-top:40px">' +
            '<div class="empty-title">Deal not found</div>' +
            '<div style="font-size:13px;color:var(--text-secondary);margin:8px 0 16px">Start a new one from the home screen.</div>' +
            '<a class="t-btn t-btn-primary" href="index.html">Back to workspace</a>' +
          '</div>'
        );
        document.documentElement.classList.add("is-ready");
        return;
      }

      let activeStage = deal.stage; // open the current stage by default

      // Always reveal the page first so no exception below can leave it invisible.
      document.documentElement.classList.add("is-ready");

      // ---- v3 lane (Lane A / Lane B / Fund) — use the lifecycle state-machine view.
      // Fund-vehicle seeded deals (Arnergy etc.) also route here because the legacy 6-stage
      // renderer expects integer deal.stage; seeded deals carry strings ("Series B", "Public").
      // Only legacy user-created fund vehicles (from the original 3-step wizard) have an
      // undefined lane + integer stage — those still fall through to render() below.
      if (deal.lane === "lane-a" || deal.lane === "lane-b" || deal.lane === "fund") {
        try {
          renderV3();
        } catch (err) {
          console.error("renderV3 failed for", deal.id, err);
          root.innerHTML = '<section class="panel" style="padding:24px"><div class="empty-title">Couldn\'t render this deal</div><div style="font-size:13px;color:var(--text-secondary);margin-top:8px;line-height:1.5">A rendering error occurred. The deal record exists but couldn\'t be displayed.<br/><br/><code style="font-family:var(--mono);font-size:11px;color:var(--down)">' + (err && err.message ? err.message : String(err)) + '</code></div><a class="t-btn t-btn-primary" href="deals.html" style="margin-top:16px">Back to deal room</a></section>';
        }
        return;
      }

      function fmtNgn(n) {
        n = +n; if (!n || isNaN(n)) return "—";
        if (n >= 1e9) return "₦" + (n / 1e9).toFixed(2) + "bn";
        if (n >= 1e6) return "₦" + (n / 1e6).toFixed(0) + "m";
        if (n >= 1e3) return "₦" + (n / 1e3).toFixed(0) + "k";
        return "₦" + n;
      }

      function renderV3() {
        const meta = DB.lifecycleMeta(deal.status);
        const tier = DB.allocationTier(deal.allocationPct);
        const allowed = DB.allowedTransitions(deal.status);
        const isOwner = !!deal.userCreated;

        // Lifecycle pipeline — four columns, each with its set of states. Current state highlighted; completed groups muted.
        const groupOrder = DB.LIFECYCLE_GROUPS;
        const currentGroupIdx = groupOrder.indexOf(meta.group);
        const pipeline = (
          '<div class="lc-pipeline">' +
            groupOrder.map(function (g, gi) {
              const states = DB.statesInGroup(g);
              const isCurrentGroup = (gi === currentGroupIdx);
              const isPast = (gi < currentGroupIdx);
              return (
                '<div class="lc-group ' + (isCurrentGroup ? "is-current" : isPast ? "is-past" : "is-future") + '">' +
                  '<div class="lc-group-head">' + g + (isCurrentGroup ? ' <span class="lc-here">here</span>' : '') + '</div>' +
                  '<div class="lc-states">' +
                    states.map(function (s) {
                      const sm = DB.lifecycleMeta(s);
                      const isCurrent = (s === deal.status);
                      return (
                        '<div class="lc-state' + (isCurrent ? " is-current" : "") + ' lc-' + sm.severity + '" title="' + DF.esc(s) + '">' +
                          '<span class="lc-state-dot"></span>' +
                          '<span class="lc-state-label">' + DF.esc(s) + '</span>' +
                        '</div>'
                      );
                    }).join("") +
                  '</div>' +
                '</div>'
              );
            }).join("") +
          '</div>'
        );

        // Allocation tier bar — 5 segments at 25/50/75/100 with current marker
        const pct = +deal.allocationPct || 0;
        const allocBlock = (
          '<div class="lc-alloc">' +
            '<div class="lc-alloc-label">' + tier.label + ' <span class="lc-alloc-blurb">· ' + tier.blurb + '</span></div>' +
            '<div class="lc-alloc-bar">' +
              [25, 50, 75, 100].map(function (t) { return '<span class="lc-alloc-tick" style="left:' + t + '%"></span>'; }).join("") +
              '<span class="lc-alloc-fill ' + tier.id + '" style="width:' + Math.min(pct, 100) + '%"></span>' +
            '</div>' +
            '<div class="lc-alloc-foot">' + pct + '% of ' + fmtNgn(deal.raiseNGN || 0) + ' target' +
              (deal.daysLeft != null ? ' · ' + deal.daysLeft + ' day' + (deal.daysLeft === 1 ? '' : 's') + ' to close' : '') +
            '</div>' +
          '</div>'
        );

        // Chart panel — every deal gets a graph. Seeded deals use the price series in D.companies;
        // user-created v3 listings get a synthetic subscription-momentum line.
        const chartHostId = "deal-chart-" + (deal.id || "x").replace(/[^a-z0-9]/gi, "");
        const seededCompany = (D.companies || []).find(function (c) { return c.id === deal.id; });
        const hasPriceSeries = !!(seededCompany && Array.isArray(seededCompany.priceHistory12m) && seededCompany.priceHistory12m.length > 1);
        const chartTitle = hasPriceSeries ? "Price history (12 months)" : "Subscription momentum";
        const chartSubtitle = hasPriceSeries ? "Synthetic series · for demo" : "Synthetic curve · 0 → " + (deal.allocationPct || 0) + "% over the raise window";
        const chartBlock = (
          '<section class="panel deal-chart-panel">' +
            '<div class="panel-header">' +
              '<div class="panel-title">' + chartTitle + '</div>' +
              '<div class="panel-sub">' + chartSubtitle + '</div>' +
            '</div>' +
            '<div id="' + chartHostId + '" class="deal-chart-host"></div>' +
          '</section>'
        );

        // Only render the dedicated brief panel when the deal has *rich* content
        // (UoP array, milestones, or Why Now). Thin Lane B / Fund deals route their brief
        // string into the snapshot sidebar instead — keeps the page structure consistent
        // with MAX.ng-style deals that have no narrative.
        const hasRichBrief = !!(
          (Array.isArray(deal.useOfProceeds) && deal.useOfProceeds.length) ||
          (Array.isArray(deal.milestones) && deal.milestones.length) ||
          deal.whyNow
        );
        const briefBlock = (deal.brief && hasRichBrief) ? (
          '<section class="panel">' +
            '<div class="panel-header"><div class="panel-title">What this raise funds</div><div class="panel-sub">' + DF.esc(deal.wrapper) + '</div></div>' +
            '<div class="lc-brief"><p>' + DF.esc(deal.brief) + '</p>' +
              (Array.isArray(deal.useOfProceeds) && deal.useOfProceeds.length ? (
                '<div class="lc-brief-uop-head">Use of proceeds</div>' +
                '<ul class="brief-uop">' + deal.useOfProceeds.map(function (u) {
                  return '<li>' +
                    '<div class="brief-uop-row">' +
                      '<span class="brief-uop-label">' + DF.esc(u.label) + '</span>' +
                      '<span class="brief-uop-pct">' + u.pctRaise + '%</span>' +
                      '<span class="brief-uop-ngn">' + fmtNgn(u.ngn) + '</span>' +
                    '</div>' +
                    '<div class="brief-uop-bar"><span style="width:' + u.pctRaise + '%"></span></div>' +
                  '</li>';
                }).join("") + '</ul>'
              ) : (deal.useOfProceedsText ? '<p class="brief-text"><strong>Use of proceeds:</strong> ' + DF.esc(deal.useOfProceedsText) + '</p>' : '')) +
              (Array.isArray(deal.milestones) && deal.milestones.length ? (
                '<div class="lc-brief-uop-head">Milestones</div>' +
                '<ul class="brief-bullets">' + deal.milestones.map(function (m) { return '<li>' + DF.esc(m) + '</li>'; }).join("") + '</ul>'
              ) : "") +
              (deal.whyNow ? ('<div class="lc-brief-uop-head">Why now</div><p class="brief-text">' + DF.esc(deal.whyNow) + '</p>') : "") +
            '</div>' +
          '</section>'
        ) : "";

        // Snapshot — universal terms in a key/value grid.
        // For thin deals (no rich brief panel), fold brief + use-of-proceeds-text into the snapshot
        // so the content is still surfaced even though the dedicated panel is hidden.
        const briefInSnap = (deal.brief && !hasRichBrief)
          ? '<div class="lc-snap-row lc-snap-brief"><span class="lc-snap-k">Brief</span><span class="lc-snap-v">' + DF.esc(deal.brief) + '</span></div>'
          : '';
        const uopInSnap = (deal.useOfProceedsText && !hasRichBrief)
          ? '<div class="lc-snap-row lc-snap-brief"><span class="lc-snap-k">Use of proceeds</span><span class="lc-snap-v">' + DF.esc(deal.useOfProceedsText) + '</span></div>'
          : '';
        const snap = (
          '<section class="panel">' +
            '<div class="panel-header"><div class="panel-title">Snapshot</div></div>' +
            '<div class="lc-snap">' +
              briefInSnap +
              uopInSnap +
              snapKV("Raise target", fmtNgn(deal.raiseNGN || 0)) +
              snapKV("Allocation", pct + "%") +
              snapKV("Ticket range", fmtNgn(deal.ticketMinNGN) + " – " + fmtNgn(deal.ticketMaxNGN)) +
              snapKV("Valuation cap", deal.valuationCapNGN ? fmtNgn(deal.valuationCapNGN) : "—") +
              snapKV("Discount", deal.discountPct ? (deal.discountPct + "%") : "—") +
              snapKV("Wrapper", deal.wrapper || "—") +
              snapKV("Closing window", deal.closingWindow || "—") +
              snapKV("Auditor", deal.auditor || "—") +
            '</div>' +
          '</section>'
        );

        // Issuer transition controls — visible only for user-created deals (Publisher Workspace lens).
        // Compliance Hold deals: friendlier "Resubmit for review" label + cooldown gate.
        let cooldownLine = "";
        if (isOwner && deal.status === "Compliance Hold" && DB.complianceApi) {
          const cmpl = DB.complianceApi();
          const resub = cmpl.canResubmit(deal.id);
          if (!resub.ok) {
            cooldownLine = '<div class="lc-trans-cooldown">3 failed reviews — resubmission locked until <strong>' +
              new Date(resub.until).toLocaleDateString("en-GB", { day:"2-digit", month:"short", year:"numeric" }) +
              '</strong>. Address remediation notes from compliance before retry.</div>';
          }
        }
        const transitions = (isOwner && allowed.length) ? (
          '<section class="panel lc-trans">' +
            '<div class="panel-header"><div class="panel-title">Issuer actions</div><div class="panel-sub">Allowed next states</div></div>' +
            '<div class="lc-trans-body">' +
              '<div class="lc-trans-current">Current: <span class="badge badge-' + meta.severity + '">' + DF.esc(deal.status) + '</span></div>' +
              cooldownLine +
              '<div class="lc-trans-btns">' +
                allowed.map(function (next) {
                  const label = (deal.status === "Compliance Hold" && next === "Under Review") ? "Resubmit for review" : ("→ " + next);
                  // Disable resubmit during cooldown
                  const isResubmitBlocked = (deal.status === "Compliance Hold" && next === "Under Review" && cooldownLine);
                  return '<button type="button" class="t-btn ' + (next === "Under Review" && deal.status === "Compliance Hold" ? "t-btn-primary" : "") + '" data-transition="' + DF.esc(next) + '"' + (isResubmitBlocked ? " disabled" : "") + '>' + DF.esc(label) + '</button>';
                }).join("") +
              '</div>' +
            '</div>' +
          '</section>'
        ) : "";

        // Countersign queue (v3 Part 9) — issuer-only, lists pending investor subscriptions.
        const countersignBlock = isOwner ? renderCountersignQueue() : "";
        // Reporting cadence (v3 Part 8) — issuer-only, visible for Active and post-close states.
        const reportsAllowed = isOwner && ["Active", "Converting", "Converted", "Matured", "Defaulted", "Written Off"].indexOf(deal.status) >= 0;
        const reportsBlock = reportsAllowed ? renderReportsPanel() : "";
        // Issuer broadcasts (v3 Part 13) — one-to-many, immutable, timestamped.
        const broadcastBlock = renderBroadcastsPanel();
        // Structured Q&A (v3 Part 13) — visible to all deal viewers, with role-aware controls.
        const qaBlock = renderQaPanel();
        // AI assistant (v3 Part 13) — corpus-constrained, cites sources, refuses to invent.
        const aiBlock = renderAiPanel();

        // Activity feed — show whatever exists; user-created deals have an activity array from dealsApi.
        const activity = (deal.activity && deal.activity.length) ? (
          '<section class="panel">' +
            '<div class="panel-header"><div class="panel-title">Activity</div></div>' +
            '<div class="lc-activity">' +
              deal.activity.slice(0, 12).map(function (a) {
                return '<div class="lc-activity-row">' +
                  '<span class="lc-activity-date">' + new Date(a.at).toLocaleDateString() + '</span>' +
                  '<span class="lc-activity-text">' + DF.esc(a.text) + '</span>' +
                '</div>';
              }).join("") +
            '</div>' +
          '</section>'
        ) : "";

        const laneCls = deal.lane === "lane-a" ? "lane-a" : "lane-b";

        root.innerHTML = (
          '<div class="lc-hero">' +
            '<div class="lc-hero-eyebrow"><a href="deals.html" style="color:inherit">Deal room</a> · ' + DF.esc(deal.laneLabel || "") + '</div>' +
            '<h1 class="lc-hero-title">' + DF.esc(deal.legalName || deal.company) + ' <span class="lc-hero-ticker">' + DF.esc(deal.ticker || "") + '</span></h1>' +
            '<div class="lc-hero-meta">' +
              '<span class="lane-chip ' + laneCls + '">' + DF.esc(deal.laneLabel) + '</span>' +
              '<span class="wrap-chip">' + DF.esc(deal.wrapper || "") + '</span>' +
              '<span class="badge badge-' + meta.severity + '">' + DF.esc(deal.status) + '</span>' +
              (deal.sector ? '<span class="lc-hero-meta-text">' + DF.esc(deal.sector) + '</span>' : '') +
              (deal.stage  ? '<span class="lc-hero-meta-text">' + DF.esc(deal.stage)  + '</span>' : '') +
              (isOwner ? '<span class="your-raise-tag" style="margin-left:auto">Your raise</span>' : '') +
              (!isOwner ? '<button class="t-btn t-btn-primary" id="v3InvestBtn" style="margin-left:auto">+ Invest</button>' : '') +
            '</div>' +
          '</div>' +

          pipeline +
          allocBlock +

          chartBlock +
          '<div class="lc-grid">' +
            '<div class="lc-main">' + briefBlock + transitions + countersignBlock + reportsBlock + broadcastBlock + aiBlock + qaBlock + activity + '</div>' +
            '<aside class="lc-side">' + snap + '</aside>' +
          '</div>'
        );

        // Render the chart once the host element exists.
        setTimeout(function () {
          const host = document.getElementById(chartHostId);
          if (!host || !window.ApexCharts) return;
          host.innerHTML = ""; // clear any prior render
          let series;
          if (hasPriceSeries) {
            // Real price history — convert from values array to {x,y} pairs spaced over 12 months.
            const arr = seededCompany.priceHistory12m;
            const n = arr.length;
            const now = Date.now();
            const startMs = now - 365 * 24 * 60 * 60 * 1000;
            series = arr.map(function (y, i) {
              const t = startMs + Math.round((i / Math.max(1, n - 1)) * (now - startMs));
              return [t, +y];
            });
          } else {
            // Synthetic subscription-momentum curve: 0 → allocationPct over the deal window.
            const target = +deal.allocationPct || 50;
            const startMs = deal.signedAt ? new Date(deal.signedAt).getTime() : (Date.now() - 90 * 24 * 60 * 60 * 1000);
            const endMs = Date.now();
            const steps = 36;
            series = [];
            for (let i = 0; i <= steps; i++) {
              const frac = i / steps;
              // S-curve (logistic-ish) so it accelerates mid-raise
              const eased = 1 / (1 + Math.exp(-6 * (frac - 0.5)));
              const y = +(target * eased).toFixed(1);
              const t = startMs + Math.round(frac * (endMs - startMs));
              series.push([t, y]);
            }
          }
          new ApexCharts(host, {
            chart: { type: "area", height: 280, toolbar: { show: false }, animations: { enabled: true, speed: 320 }, zoom: { enabled: false } },
            series: [{ name: hasPriceSeries ? "Price" : "% subscribed", data: series }],
            colors: ["#0E7A3C"],
            stroke: { curve: "smooth", width: 2.2, lineCap: "round" },
            fill: { type: "gradient", gradient: { shadeIntensity: 1, opacityFrom: 0.22, opacityTo: 0, stops: [0, 100] } },
            markers: { size: 0, hover: { size: 5 }, strokeWidth: 0, colors: ["#0E7A3C"] },
            grid: { borderColor: "rgba(15,23,42,0.06)", strokeDashArray: 0, padding: { left: 8, right: 8, top: 0, bottom: 0 } },
            tooltip: {
              theme: "light",
              x: { format: "MMM dd, yyyy" },
              y: { formatter: function (v) { return hasPriceSeries ? "$" + v.toFixed(2) : v.toFixed(1) + "%"; } }
            },
            xaxis: {
              type: "datetime",
              labels: { style: { colors: "#94a3b8", fontSize: "10px", fontFamily: "ui-monospace, monospace" } },
              axisBorder: { color: "rgba(15,23,42,0.08)" },
              axisTicks: { color: "rgba(15,23,42,0.08)" }
            },
            yaxis: {
              labels: {
                style: { colors: "#94a3b8", fontSize: "10px", fontFamily: "ui-monospace, monospace" },
                formatter: function (v) { return hasPriceSeries ? "$" + v.toFixed(0) : v.toFixed(0) + "%"; }
              }
            },
            dataLabels: { enabled: false }
          }).render();
        }, 0);

        // Wire issuer transitions
        root.querySelectorAll("[data-transition]").forEach(function (b) {
          b.addEventListener("click", function () {
            const to = b.getAttribute("data-transition");
            const from = deal.status;
            T.modal("Confirm transition", '<div style="font-size:13px;color:var(--text-secondary)">Move deal from <strong>' + DF.esc(from) + '</strong> to <strong>' + DF.esc(to) + '</strong>? This is logged and pushed to the activity feed.</div>',
              { footer: '<button class="t-btn" data-modal-close>Cancel</button><button class="t-btn t-btn-primary" id="lcConfirmTransition">Confirm</button>' });
            document.getElementById("lcConfirmTransition").addEventListener("click", function () {
              deal.status = to;
              deal.statusType = DB.lifecycleMeta(to).severity;
              deal.activity = deal.activity || [];
              deal.activity.unshift({ at: new Date().toISOString(), text: "Status: " + from + " → " + to });
              api.save(deal);
              T.alerts().add({
                symbol: deal.ticker, label: from + " → " + to, value: "", unit: "",
                templateId: "lifecycle", severity: DB.transitionSeverity(from, to)
              });
              T.closeModal();
              T.toast("Now " + to);
              renderV3();
            });
          });
        });

        // Wire report-form buttons
        root.querySelectorAll("[data-rep]").forEach(function (b) {
          b.addEventListener("click", function () { openReportModal(b.getAttribute("data-rep")); });
        });

        // Wire countersign queue actions (issuer-only) + tab switching
        root.querySelectorAll("[data-cs-tab]").forEach(function (b) {
          b.addEventListener("click", function () { _csTab = b.getAttribute("data-cs-tab"); renderV3(); });
        });
        root.querySelectorAll("[data-cs-accept]").forEach(function (b) {
          b.addEventListener("click", function () { openCountersignAccept(b.getAttribute("data-cs-accept")); });
        });
        root.querySelectorAll("[data-cs-decline]").forEach(function (b) {
          b.addEventListener("click", function () { openCountersignDecline(b.getAttribute("data-cs-decline")); });
        });

        // Wire broadcast composer (issuer-only)
        const bcNew = root.querySelector("#bc-new");
        if (bcNew) bcNew.addEventListener("click", openBroadcastComposer);

        // Wire AI assistant form
        const aiForm = root.querySelector("#ai-form");
        if (aiForm) aiForm.addEventListener("submit", function (e) {
          e.preventDefault();
          const qEl = root.querySelector("#ai-q");
          const text = qEl.value.trim();
          if (!text) return;
          onAiAsk(text);
        });

        // Wire Q&A — ask + answer
        const askBtn = root.querySelector("#qa-ask");
        if (askBtn) askBtn.addEventListener("click", openAskQuestionModal);
        root.querySelectorAll("[data-qa-answer]").forEach(function (b) {
          b.addEventListener("click", function () { openAnswerQuestionModal(b.getAttribute("data-qa-answer")); });
        });

        // Wire investor "+ Invest" — same gating as deals.html
        const inv = root.querySelector("#v3InvestBtn");
        if (inv) inv.addEventListener("click", function () {
          const acctApi = DB.accountApi ? DB.accountApi() : null;
          const acc = acctApi ? acctApi.get() : null;
          if (!acc || !acc.verified) { T.openPaywallModal && T.openPaywallModal(); return; }
          if (deal.lane === "lane-b" && (acc.kycTier || 1) < 3) {
            T.openTierUpgradeModal && T.openTierUpgradeModal({ target: 3, reason: "Lane B private placement subscription" });
            return;
          }
          window.location.href = "deals.html?invest=" + encodeURIComponent(deal.id);
        });
      }

      function snapKV(k, v) {

      // ---- v3 AI assistant (Part 13) — strictly corpus-bound, cites sources, refuses out-of-corpus questions ----
      // Builds a retrievable corpus from everything the issuer has published on this deal. Mock retrieval
      // uses token overlap scoring; real impl would use embeddings + RAG with the same corpus boundary.
      // Note: STOP_WORDS is declared at the top of the IIFE (avoids TDZ via hoisted renderV3).
      function tokenize(s) {
        return String(s || "").toLowerCase().replace(/[^a-z0-9₦% ]/g, " ").split(/\s+/).filter(function (w) { return w && !STOP_WORDS[w] && w.length > 1; });
      }
      function buildCorpus() {
        const items = [];
        if (deal.brief) items.push({ source: "Deal brief", text: deal.brief, badge: "brief" });
        if (deal.whyNow) items.push({ source: "Why now", text: deal.whyNow, badge: "context" });
        if (Array.isArray(deal.useOfProceeds) && deal.useOfProceeds.length) {
          items.push({
            source: "Use of Proceeds",
            text: deal.useOfProceeds.map(function (u) { return u.label + " (" + u.pctRaise + "% · " + Math.round((u.ngn || 0) / 1e6) + "m NGN)"; }).join(". "),
            badge: "uop"
          });
        }
        if (Array.isArray(deal.milestones) && deal.milestones.length) {
          items.push({ source: "Milestones", text: deal.milestones.join(". "), badge: "milestones" });
        }
        // Instrument terms
        const terms = [];
        if (deal.wrapper) terms.push("Wrapper: " + deal.wrapper);
        if (deal.valuationCapNGN) terms.push("Valuation cap: ₦" + Math.round(deal.valuationCapNGN / 1e6) + "m");
        if (deal.discountPct) terms.push("Discount: " + deal.discountPct + "%");
        if (deal.conversionTrigger) terms.push("Conversion trigger: " + deal.conversionTrigger);
        if (deal.tenor) terms.push("Tenor: " + deal.tenor);
        if (deal.closingWindow) terms.push("Closing window: " + deal.closingWindow);
        if (deal.auditor) terms.push("Auditor: " + deal.auditor);
        if (deal.raiseNGN) terms.push("Target raise: ₦" + Math.round(deal.raiseNGN / 1e6) + "m");
        if (deal.ticketMinNGN && deal.ticketMaxNGN) terms.push("Ticket range: ₦" + Math.round(deal.ticketMinNGN / 1e3) + "k–₦" + Math.round(deal.ticketMaxNGN / 1e6) + "m");
        if (terms.length) items.push({ source: "Instrument terms", text: terms.join(". "), badge: "terms" });
        // Reports
        (deal.reports || []).forEach(function (r) {
          const when = new Date(r.at).toLocaleDateString("en-GB", { day:"2-digit", month:"short", year:"numeric" });
          if (r.cycle === "weekly") items.push({ source: "Weekly pulse · " + when, text: r.pulse, badge: "report" });
          if (r.cycle === "monthly") items.push({
            source: "Monthly fiscal · " + when,
            text: "Revenue: " + (r.revenue || "—") + ". Cash: " + (r.cash || "—") + ". Burn: " + (r.burn || "—") + ". Headcount: " + (r.headcount || "—") + ". Wins/losses: " + (r.wins || "—"),
            badge: "report"
          });
          if (r.cycle === "quarterly") {
            const kpi = r.kpis || {};
            items.push({
              source: "Quarterly MD&A · " + when,
              text: (r.narrative || "") + ". KPIs — revenue: " + (kpi.revenue || "—") + ", gross margin: " + (kpi.margin || "—") + ", cash runway: " + (kpi.runway || "—") + ", ARR: " + (kpi.arr || "—"),
              badge: "report"
            });
          }
        });
        // Answered Q&A
        (deal.qa || []).forEach(function (q) {
          if (q.answer) items.push({
            source: "Q&A · " + new Date(q.answeredAt).toLocaleDateString("en-GB", { day:"2-digit", month:"short" }),
            text: "Q: " + q.question + " A: " + q.answer,
            badge: "qa"
          });
        });
        // Broadcasts
        (deal.broadcasts || []).forEach(function (b) {
          items.push({
            source: "Broadcast · " + new Date(b.at).toLocaleDateString("en-GB", { day:"2-digit", month:"short" }),
            text: b.body,
            badge: "broadcast"
          });
        });
        // Pre-tokenize for scoring
        items.forEach(function (it) { it.tokens = tokenize(it.source + " " + it.text); });
        return items;
      }
      function askCorpus(question, corpus) {
        const qTokens = tokenize(question);
        if (!qTokens.length) return null;
        // Score each corpus item by token overlap
        const scored = corpus.map(function (it) {
          let score = 0;
          qTokens.forEach(function (qt) {
            it.tokens.forEach(function (ct) {
              if (qt === ct) score += 2;
              else if (ct.indexOf(qt) >= 0 || qt.indexOf(ct) >= 0) score += 1;
            });
          });
          return { item: it, score: score };
        }).filter(function (s) { return s.score > 0; }).sort(function (a, b) { return b.score - a.score; });
        if (!scored.length) return null;
        const topThreshold = scored[0].score * 0.6;
        return scored.filter(function (s) { return s.score >= topThreshold; }).slice(0, 3);
      }
      // _aiHistory is declared at the top of the IIFE (TDZ-safe under hoisted renderV3).
      function renderAiPanel() {

        const corpusSummary = corpus.length
          ? corpus.length + " published source" + (corpus.length === 1 ? "" : "s") + ": " + corpus.map(function (c) { return c.badge; }).filter(function (b, i, arr) { return arr.indexOf(b) === i; }).join(", ")

        const history = _aiHistory.length ? _aiHistory.map(function (entry) {
          return (
            '<div class="ai-turn">' +
              '<div class="ai-q"><span class="ai-tag">You</span><span>' + DF.esc(entry.q) + '</span></div>' +
              '<div class="ai-a">' +
                '<span class="ai-tag ai-tag-bot">Assistant</span>' +
                '<div class="ai-a-body">' + entry.a + '</div>' +
                (entry.cites && entry.cites.length
                  ? '<div class="ai-cites">' + entry.cites.map(function (c) { return '<span class="ai-cite">' + DF.esc(c) + '</span>'; }).join("") + '</div>'
                  : '') +
              '</div>' +
            '</div>'
          );
        }).join("") : '<div class="ai-empty">Ask anything answerable from this deal\'s published materials.</div>';

        return (
          '<section class="panel ai-panel">' +
            '<div class="panel-header">' +
              '<div class="panel-title">Ask the deal corpus</div>' +
              '<div class="panel-sub">Corpus-bound · cites sources · not investment advice</div>' +
            '</div>' +
            '<div class="ai-body">' +
              '<div class="ai-disclaimer">' +
                '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
                '<span>Answers drawn strictly from this issuer\'s published corpus. The assistant cannot generate new disclosures. ' + DF.esc(corpusSummary) + '</span>' +
              '</div>' +
              '<div class="ai-history">' + history + '</div>' +
              '<form class="ai-form" id="ai-form" autocomplete="off">' +
                '<input class="t-input" id="ai-q" type="text" placeholder="e.g. What\'s the cold-storage spend? When does the next milestone hit? Who\'s the auditor?" />' +
                '<button type="submit" class="t-btn t-btn-primary" id="ai-ask">Ask</button>' +
              '</form>' +
            '</div>' +
          '</section>'
        );
      }
      function onAiAsk(question) {
        const corpus = buildCorpus();
        const hits = askCorpus(question, corpus);
        let answer, cites = [];
        if (!corpus.length) {
          answer = "<em>The issuer hasn't published anything to this deal yet. Once a brief, report, Q&A answer, or broadcast lands, I can answer from those.</em>";
        } else if (!hits || !hits.length) {
          answer = "<em>I can only answer from what this issuer has published on this deal. Your question isn't covered in the current corpus (" + corpus.length + " source" + (corpus.length === 1 ? "" : "s") + "). Try asking about the brief, use of proceeds, milestones, terms, reports, Q&A, or broadcasts — or submit a structured Q&A question to the issuer.</em>";
        } else {
          // Render the top hits as a synthesized answer
          answer = hits.map(function (h) {
            return "<p><strong>" + DF.esc(h.item.source) + ":</strong> " + DF.esc(h.item.text) + "</p>";
          }).join("");
          cites = hits.map(function (h) { return h.item.source; });
        }
        _aiHistory.push({ q: question, a: answer, cites: cites });
        renderV3();
      }
      function renderQaPanel() {
        deal.qa = deal.qa || [];
        const qa = deal.qa.slice().reverse();
        const acctApi = DB.accountApi ? DB.accountApi() : null;
        const acc = acctApi ? acctApi.get() : null;
        const owner = !!deal.userCreated;
        const verified = acc && acc.verified;

        const investorAsk = (!owner && verified) ? (
          '<button class="t-btn t-btn-primary" type="button" id="qa-ask">+ Ask a question</button>'
        ) : (!owner && !verified) ? (
          '<button class="t-btn" type="button" data-action="open-paywall">Verify to ask a question</button>'
        ) : '';

        const items = qa.length ? qa.map(function (q) {
          const askedDate = new Date(q.askedAt).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
          const answeredDate = q.answeredAt ? new Date(q.answeredAt).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }) : "";
          const ans = q.answer ? (
            '<div class="qa-answer">' +
              '<div class="qa-answer-head"><strong>Issuer reply</strong> <span class="qa-date">· ' + answeredDate + ' · published to all subscribers</span></div>' +
              '<p>' + DF.esc(q.answer) + '</p>' +
            '</div>'
          ) : (owner ? (
            '<div class="qa-answer qa-pending"><div class="qa-pending-row"><span>Awaiting your published response</span>' +
              '<button class="t-btn t-btn-primary" type="button" data-qa-answer="' + q.id + '" style="height:26px;padding:0 10px;font-size:11px">Publish answer</button>' +
            '</div></div>'
          ) : '<div class="qa-answer qa-pending"><em>Awaiting issuer response.</em></div>');
          return (
            '<div class="qa-item">' +
              '<div class="qa-question">' +
                '<div class="qa-q-head"><strong>' + DF.esc(q.askedBy || "Investor") + '</strong> <span class="qa-date">· ' + askedDate + '</span></div>' +
                '<p>' + DF.esc(q.question) + '</p>' +
              '</div>' +
              ans +
            '</div>'
          );
        }).join("") : '<div class="rep-empty">No questions yet. Once posted, issuer answers are auto-published to all subscribed investors simultaneously and immutably (v3 Part 13).</div>';

        return (
          '<section class="panel">' +
            '<div class="panel-header">' +
              '<div class="panel-title">Q&amp;A · fair disclosure</div>' +
              '<div class="panel-sub">No private chat · all answers go to all subscribers</div>' +
            '</div>' +
            '<div class="qa-body">' +
              '<div class="qa-toolbar">' + investorAsk + '</div>' +
              '<div class="qa-list">' + items + '</div>' +
            '</div>' +
          '</section>'
        );
      }
      function openAskQuestionModal() {
        const body = (
          '<p class="rep-hint">Your question goes into the issuer\'s queue. When answered, the response auto-publishes to all subscribed investors (you can\'t get a private reply — that would breach fair-disclosure rules).</p>' +
          '<label class="rep-label">Your question</label>' +
          '<textarea class="t-input" id="qa-q" rows="4" placeholder="e.g. What\'s the unit economics on the new Ibadan hub vs the Lagos one?"></textarea>'
        );
        T.modal("Ask a question", body, {
          footer: '<button class="t-btn" data-modal-close>Cancel</button><button class="t-btn t-btn-primary" id="qa-submit">Submit</button>'
        });
        document.getElementById("qa-submit").addEventListener("click", function () {
          const text = document.getElementById("qa-q").value.trim();
          if (!text) { T.toast("Type your question first"); return; }
          const profile = (DB.getProfile && DB.getProfile()) || {};
          const asker = profile.firstName ? (profile.firstName + " " + (profile.lastName || "")).trim() : "Investor";
          deal.qa = deal.qa || [];
          deal.qa.push({
            id: "qa_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
            question: text, askedBy: asker, askedAt: new Date().toISOString(),
            answer: "", answeredAt: null
          });
          api.save(deal);
          T.alerts().add({
            symbol: deal.ticker, label: "New Q&A question", value: "", unit: "",
            templateId: "qa", severity: "standard"
          });
          T.closeModal();
          T.toast("Question submitted.");
          renderV3();
        });
      }
      function openAnswerQuestionModal(qid) {
        const q = (deal.qa || []).find(function (x) { return x.id === qid; });
        if (!q) return;
        const body = (
          '<p class="rep-hint">This answer publishes to <strong>all subscribed investors</strong> simultaneously. It is timestamped and cannot be edited or removed (v3 Part 13).</p>' +
          '<div class="qa-q-preview"><strong>' + DF.esc(q.askedBy) + '</strong>: ' + DF.esc(q.question) + '</div>' +
          '<label class="rep-label">Your published response</label>' +
          '<textarea class="t-input" id="qa-a" rows="5" placeholder="Be specific. Cite documents in your Data Cell where helpful."></textarea>'
        );
        T.modal("Publish answer", body, {
          footer: '<button class="t-btn" data-modal-close>Cancel</button><button class="t-btn t-btn-primary" id="qa-publish">Publish to all subscribers</button>'
        });
        document.getElementById("qa-publish").addEventListener("click", function () {
          const text = document.getElementById("qa-a").value.trim();
          if (!text) { T.toast("Answer can't be empty"); return; }
          q.answer = text;
          q.answeredAt = new Date().toISOString();
          deal.activity = deal.activity || [];
          deal.activity.unshift({ at: q.answeredAt, text: "Q&A answer published" });
          api.save(deal);
          T.alerts().add({
            symbol: deal.ticker, label: "Q&A answered · broadcast to subscribers", value: "", unit: "",
            templateId: "qa", severity: "critical"
          });
          T.closeModal();
          T.toast("Answer published.");
          renderV3();
        });
      }
      function openReportModal(cycle) {
        let body, foot;
        if (cycle === "weekly") {
          body = (
            '<label class="rep-label">One-line operational pulse <span class="rep-hint">(visible to committed investors only · 240 chars)</span></label>' +
            '<textarea class="t-input" id="rep-pulse" rows="2" maxlength="240" placeholder="e.g. Closed our first QSR offtake renewal at +12% volume. Hub utilisation at 78%."></textarea>'

        } else if (cycle === "monthly") {

            '<p class="rep-hint">v3 Part 8 — 5 structured sections, not free-text upload. Enables auto-comparison across portfolio companies.</p>' +
            '<div class="rep-form-grid">' +
              '<div><label class="rep-label">Revenue (this month)</label><input class="t-input" id="rep-revenue" placeholder="e.g. ₦42m" /></div>' +

              '<div><label class="rep-label">Burn rate</label><input class="t-input" id="rep-burn" placeholder="e.g. ₦18m/mo net" /></div>' +

            '<div class="rep-form-grid" style="margin-top:10px">' +
              '<div><label class="rep-label">Revenue (qtr)</label><input class="t-input" id="rep-q-revenue" placeholder="₦" /></div>' +
              '<div><label class="rep-label">Gross margin</label><input class="t-input" id="rep-q-margin" placeholder="%" /></div>' +
              '<div><label class="rep-label">Cash runway</label><input class="t-input" id="rep-q-runway" placeholder="months" /></div>' +
              '<div><label class="rep-label">ARR</label><input class="t-input" id="rep-q-arr" placeholder="₦" /></div>' +

          );

        }
        T.modal("File " + cycleLabel(cycle), body, { footer: foot });
        document.getElementById("repSave").addEventListener("click", function () {
          const rec = { cycle: cycle, at: new Date().toISOString() };
          if (cycle === "weekly")    rec.pulse = document.getElementById("rep-pulse").value.trim();
          if (cycle === "monthly") {
            rec.revenue = document.getElementById("rep-revenue").value.trim();
            rec.cash = document.getElementById("rep-cash").value.trim();
            rec.burn = document.getElementById("rep-burn").value.trim();

          }

              revenue: document.getElementById("rep-q-revenue").value.trim(),
              margin:  document.getElementById("rep-q-margin").value.trim(),
              runway:  document.getElementById("rep-q-runway").value.trim(),
              arr:     document.getElementById("rep-q-arr").value.trim()
            };

          deal.reports = deal.reports || [];
          deal.reports.push(rec);
          deal.activity = deal.activity || [];
          deal.activity.unshift({ at: rec.at, text: "Filed " + cycleLabel(cycle) });
          api.save(deal);
          T.alerts().add({
            symbol: deal.ticker, label: cycleLabel(cycle) + " filed", value: "", unit: "",
            templateId: "report", severity: "standard"
          });

      function render() {
        const v = DF.getVehicle(deal.vehicleType);
        root.innerHTML = (
          '<div class="deal-hero">' +
            '<div>' +
              '<div style="font-family:var(--mono);font-size:11px;letter-spacing:0.18em;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px">' +
                '<a href="index.html" style="color:inherit">Workspace</a> &middot; Deal' +
              '</div>' +
              '<h1 style="font-family:var(--serif);font-size:36px;font-weight:400;color:var(--text-primary);letter-spacing:-0.025em;line-height:1.05">' + DF.esc(deal.name) + '</h1>' +
              '<div class="deal-hero-meta" style="margin-top:10px">' +
                (deal.sponsor ? '<span>' + DF.esc(deal.sponsor) + '</span><span>·</span>' : '') +
                (deal.sector  ? '<span>' + DF.esc(deal.sector)  + '</span><span>·</span>' : '') +
                '<span class="deal-chip">' + v.name + '</span>' +
                '<span class="deal-chip" style="background:#fafafa">' + DF.esc(deal.status) + '</span>' +
                '<button class="t-btn" id="commitBtn" type="button" style="margin-left:auto">+ Commit as investor</button>' +
                '<span style="font-family:var(--mono);font-size:11px;color:var(--text-muted)">Updated ' + new Date(deal.updated).toLocaleDateString() + '</span>' +
              '</div>' +
            '</div>' +
            stageStripHtml(deal.stage) +
          '</div>' +

          '<div class="deal-grid">' +
            '<section class="panel">' +
              '<div class="panel-header">' +
                '<div class="panel-title">' + DF.stages[activeStage - 1].name + '</div>' +
                '<div class="panel-sub">Stage ' + activeStage + ' of 6</div>' +
              '</div>' +
              '<div style="padding:14px 16px">' +
                stagePanelHtml(activeStage) +
              '</div>' +
            '</section>' +

            '<aside style="display:grid;gap:14px">' +
              '<section class="panel">' +
                '<div class="panel-header"><div class="panel-title">Snapshot</div></div>' +
                '<div style="padding:14px 16px">' + snapshotHtml() + '</div>' +
              '</section>' +
              '<section class="panel">' +
                '<div class="panel-header"><div class="panel-title">Activity</div></div>' +
                '<div style="padding:8px 16px 14px;max-height:280px;overflow:auto">' +
                  deal.activity.slice(0, 12).map(function (a) {
                    return '<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-t);font-size:12px">' +
                             '<span style="font-family:var(--mono);color:var(--text-muted);min-width:80px">' + new Date(a.at).toLocaleDateString() + '</span>' +
                             '<span style="color:var(--text-secondary)">' + DF.esc(a.text) + '</span>' +
                           '</div>';
                  }).join("") +
                '</div>' +
              '</section>' +
            '</aside>' +
          '</div>'
        );

        // wire stage strip click
        root.querySelectorAll("[data-go-stage]").forEach(function (b) {
          b.addEventListener("click", function () {
            activeStage = parseInt(b.getAttribute("data-go-stage"), 10);
            render();
          });
        });
        // wire primary CTAs
        const advance = root.querySelector("#advanceBtn");
        if (advance) advance.addEventListener("click", function () {
          const next = DF.stages[deal.stage];
          T.modal((DF.stages[deal.stage - 1].advance || "Advance") + " ?",
            '<div style="font-size:13px;color:var(--text-secondary)">This will mark the deal as <strong>' + (next ? next.name : "next") + '</strong>. You can still revisit earlier stages.</div>',
            { footer: '<button class="t-btn" data-modal-close>Cancel</button><button class="t-btn t-btn-primary" id="confirmAdvance">Confirm</button>' }
          );
          document.getElementById("confirmAdvance").addEventListener("click", function () {
            api.advanceStage(deal.id);
            const fresh = api.get(deal.id);
            Object.assign(deal, fresh);
            activeStage = deal.stage;
            T.closeModal();
            T.toast("Now in " + DF.stages[deal.stage - 1].name);
            render();
          });
        });
        const commit = root.querySelector("#commitBtn");
        if (commit) commit.addEventListener("click", openCommitModal);
        const editTerms = root.querySelector("#editTermsBtn");
        if (editTerms) editTerms.addEventListener("click", openEditTerms);

        const addArtifact = root.querySelector("#addArtifactBtn");
        if (addArtifact) addArtifact.addEventListener("click", function () {
          openAddArtifact(activeStage);
        });
        // commit-status changes in Outreach
        root.querySelectorAll("[data-status-for]").forEach(function (sel) {
          sel.addEventListener("change", function () {
            const positionId = sel.getAttribute("data-status-for");
            const next = sel.value; // soft | hard | signed
            const investor = deal.investors.find(function (i) { return i.positionId === positionId; });
            if (!investor) return;
            investor.status = next;
            deal.activity.unshift({ at: new Date().toISOString(), text: "Commitment status: " + next + " · " + DF.fmtMoney(investor.commitment) });
            api.save(deal);
            // also sync onto the position record so the LP-side reflects it
            const pos = positions.get(positionId);
            if (pos) {
              pos.status = next === "signed" ? "Signed" : next === "hard" ? "Hard commit" : "Soft commit";
              positions.save(pos);
            }
            T.toast("Status updated to " + next);
            render();
          });
        });
      }

      function stageStripHtml(current) {
        return '<div class="stage-strip">' + DF.stages.map(function (s) {
          let cls = "stage-seg";
          if (s.n < current) cls += " is-done";
          if (s.n === activeStage) cls += " is-current";
          return (
            '<button type="button" class="' + cls + '" data-go-stage="' + s.n + '">' +
              '<div class="stage-seg-num">STAGE ' + s.n + '</div>' +
              '<div class="stage-seg-name">' + s.name + '</div>' +
            '</button>'
          );
        }).join("") + '</div>';
      }

      function snapshotHtml() {
        const v = DF.getVehicle(deal.vehicleType);
        const committed = deal.investors.reduce(function (a, i) { return a + (i.commitment || 0); }, 0);

        const raisedRow = (
          '<div class="kv-row" style="flex-direction:column;align-items:stretch;gap:6px">' +
            '<div style="display:flex;justify-content:space-between"><span class="kv-key">Committed</span>' +
              '<span class="kv-val"><strong>' + DF.fmtMoney(committed) + '</strong> of ' + DF.fmtMoney(target) + '</span>' +
            '</div>' +
            '<div style="height:5px;background:var(--border-t);border-radius:3px;overflow:hidden"><div style="width:' + pct + '%;height:100%;background:var(--text-primary)"></div></div>' +
            '<div style="font-size:11px;color:var(--text-muted);text-align:right">' + pct + '% of target · ' + deal.investors.length + ' investor' + (deal.investors.length === 1 ? '' : 's') + '</div>' +

            kvRow("Carry",         deal.terms.carry + "%") +
            kvRow("Close target",  deal.terms.closeDate || "—") +
          '</div>'
        );

      function kvRow(k, v) { return '<div class="kv-row"><span class="kv-key">' + k + '</span><span class="kv-val">' + DF.esc(v) + '</span></div>'; }

      function stagePanelHtml(n) {
        const s = DF.stages[n - 1];
        const isCurrent = n === deal.stage;
        const isDone    = n < deal.stage;

        const head = (
          '<div class="stage-panel-head">' +
            '<div class="stage-panel-blurb">' + s.blurb + '</div>' +
            '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
              (n === 2 ? '<button class="t-btn" id="editTermsBtn" type="button">Edit terms</button>' : '') +
              (isCurrent && s.advance ? '<button class="t-btn t-btn-primary" id="advanceBtn" type="button">' + s.advance + '</button>' : '') +
              (isDone ? '<span class="badge badge-success">Complete</span>' : '') +
            '</div>' +
          '</div>'
        );

        let body = "";
        if (s.key === "source")     body = sourceBody();
        if (s.key === "structure")  body = structureBody();
        if (s.key === "outreach")   body = outreachBody();
        if (s.key === "diligence")  body = diligenceBody();
        if (s.key === "close")      body = closeBody();
        if (s.key === "administer") body = administerBody();

        const artifacts = artifactsForStage(n);
        const artifactsHtml = (
          '<div style="margin-top:20px">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
              '<div style="font-family:var(--mono);font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em">Artifacts</div>' +
              '<button class="t-btn" id="addArtifactBtn" type="button" style="height:26px;padding:0 10px;font-size:11px">+ Add</button>' +
            '</div>' +
            (artifacts.length
              ? '<div class="artifact-list">' + artifacts.map(artifactRow).join("") + '</div>'
              : '<div style="font-size:12px;color:var(--text-muted);font-family:var(--mono);padding:8px 0">No artifacts yet. Suggested: ' + suggestedArtifactsLabel(n) + '.</div>'
            ) +
          '</div>'
        );

        return head + body + artifactsHtml;
      }

            '<div class="kv-list">' +
              kvRow("Management fee", deal.terms.mgmtFee + "%") +
              kvRow("Carry",          deal.terms.carry + "%") +
              kvRow("Min check",      DF.fmtMoney(deal.terms.minCheck)) +

      function outreachBody() {
        const totals = deal.investors.reduce(function (acc, i) {
          acc.count += 1; acc.amt += (i.commitment || 0);
          return acc;
        }, { count: 0, amt: 0 });
        const headStat = (
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:12px;flex-wrap:wrap">' +
            '<div style="font-size:13px;color:var(--text-secondary)">People who committed to this deal. Track soft &rarr; hard &rarr; signed.</div>' +
            '<div style="font-size:12px;color:var(--text-muted)">' +
              '<strong style="color:var(--text-primary)">' + totals.count + '</strong> investors &middot; <strong style="color:var(--text-primary)">' + DF.fmtMoney(totals.amt) + '</strong> committed' +
            '</div>' +
          '</div>'
        );

        if (!deal.investors.length) {
          return headStat +
            '<div style="font-size:12px;color:var(--text-muted);padding:10px 12px;background:var(--bg-base);border:1px dashed var(--border-t);border-radius:4px">No commitments yet. Click <strong style="color:var(--text-primary)">+ Commit as investor</strong> at the top to test this surface.</div>';
        }

        const rows = deal.investors.map(function (i) {
          const pos = positions.get(i.positionId);
          const name = (pos && pos._investorName) || (window.DataBank.formatName() || "You");
          const status = (i.status || "Soft").toLowerCase(); // soft | hard | signed
          const statusLabel = status.charAt(0).toUpperCase() + status.slice(1);
          const badgeCls = status === "signed" ? "badge-success" : status === "hard" ? "badge-info" : "badge-warn";
          return (
            '<tr>' +
              '<td>' + DF.esc(name) + '</td>' +
              '<td class="num">' + DF.fmtMoney(i.commitment) + '</td>' +
              '<td style="color:var(--text-secondary)">' + new Date(i.at).toLocaleDateString() + '</td>' +
              '<td><span class="badge ' + badgeCls + '">' + statusLabel + '</span></td>' +
              '<td style="text-align:right">' +
                '<select class="t-input" data-status-for="' + i.positionId + '" style="height:26px;padding:0 8px;font-size:11px;width:auto">' +
                  '<option value="soft"'   + (status === "soft"   ? " selected" : "") + '>Soft</option>' +
                  '<option value="hard"'   + (status === "hard"   ? " selected" : "") + '>Hard</option>' +
                  '<option value="signed"' + (status === "signed" ? " selected" : "") + '>Signed</option>' +
                '</select>' +
              '</td>' +
            '</tr>'
          );
        }).join("");

        return headStat +
          '<div style="overflow-x:auto;background:var(--bg-base);border:1px solid var(--border-t);border-radius:4px">' +
            '<table class="db-table">' +
              '<thead><tr><th>Investor</th><th class="text-right">Commitment</th><th>Committed</th><th>Status</th><th></th></tr></thead>' +
              '<tbody>' + rows + '</tbody>' +
            '</table>' +
          '</div>';
      }

      function diligenceBody() {
        return '<div style="font-size:13px;color:var(--text-secondary)">Data room opens for hard-committed investors. Upload diligence pack, manage Q&amp;A, control doc visibility per investor.</div>';
      }

      function closeBody() {
        return '<div style="font-size:13px;color:var(--text-secondary)">Generate subscription package per investor. Collect signatures, KYC, AML, wire confirmations. Lock allocations.</div>';
      }

      function administerBody() {
        return (
          '<div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">Vehicle is funded. Manage cap table, capital calls, distributions, NAV, and LP reporting.</div>' +
          '<div class="kv-list" style="background:var(--bg-base);border:1px solid var(--border-t);border-radius:4px;padding:12px 14px">' +
            kvRow("Capital committed", "$0") +
            kvRow("Called to date",    "$0") +
            kvRow("Distributed",       "$0") +
            kvRow("NAV",               "—") +
          '</div>'
        );
      }

      // ---------- artifacts ----------
      const SUGGESTED = {
        1: [{ name: "Deal memo (draft)",       kind: "memo"   }],
        2: [{ name: "Term sheet",              kind: "terms"  }],
        3: [{ name: "Teaser",                  kind: "teaser" }, { name: "Interest tracker", kind: "tracker" }],
        4: [{ name: "Diligence pack",          kind: "pack"   }, { name: "Q&A log",          kind: "qa"      }],
        5: [{ name: "Subscription package",    kind: "subdoc" }, { name: "Wire instructions", kind: "wire"   }],
        6: [{ name: "Capital call notice",     kind: "call"   }, { name: "Quarterly LP update", kind: "update" }, { name: "Distribution notice", kind: "dist" }],
      };

      function suggestedArtifactsLabel(n) {
        return SUGGESTED[n].map(function (a) { return a.name; }).join(", ");
      }

      function artifactsForStage(n) {
        return deal.artifacts.filter(function (a) { return a.stage === n; });
      }

      function artifactRow(a) {
        const fileMeta = a.fileName
          ? DF.esc(a.fileName) + ' · ' + fmtBytes(a.fileSize)
          : DF.esc(a.kind) + ' · no file';
        const badge = a.fileName
          ? '<span class="badge badge-success">Uploaded</span>'
          : '<span class="badge badge-info">Draft</span>';
        return (
          '<div class="artifact-row">' +
            '<div class="artifact-row-left">' +
              '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' +
              '<div>' +
                '<div class="artifact-row-name">' + DF.esc(a.name) + '</div>' +
                '<div class="artifact-row-meta">' + fileMeta + ' · ' + new Date(a.created).toLocaleDateString() + '</div>' +
              '</div>' +
            '</div>' +
            badge +
          '</div>'
        );
      }

      function fmtBytes(n) {
        if (!n && n !== 0) return "—";
        if (n < 1024) return n + " B";
        if (n < 1024*1024) return (n / 1024).toFixed(1) + " KB";
        return (n / (1024*1024)).toFixed(1) + " MB";
      }

      function openAddArtifact(stage) {
        const suggested = SUGGESTED[stage];
        const opts = suggested.map(function (s) {
          return '<option value="' + s.kind + '" data-name="' + s.name + '">' + s.name + '</option>';
        }).join("");
        T.modal("Add artifact · " + DF.stages[stage - 1].name,
          '<div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">Attach a document to this stage. Suggested artifacts are listed below.</div>' +
          '<div style="display:grid;gap:10px">' +
            '<div><label>Type</label><select class="t-input" id="artifactKind" style="width:100%"><option value="">Custom</option>' + opts + '</select></div>' +
            '<div><label>Name</label><input class="t-input" id="artifactName" placeholder="e.g. Sunray PPM v1.2" style="width:100%" /></div>' +
            '<div><label>File <span style="color:var(--text-muted);font-weight:400">(optional — metadata stored)</span></label><input class="t-input" id="artifactFile" type="file" style="width:100%;padding:6px 8px" /></div>' +
          '</div>',
          { footer: '<button class="t-btn" data-modal-close>Cancel</button><button class="t-btn t-btn-primary" id="saveArtifactBtn">Save artifact</button>' }
        );
        const sel = document.getElementById("artifactKind");
        const nameEl = document.getElementById("artifactName");
        sel.addEventListener("change", function () {
          const opt = sel.options[sel.selectedIndex];
          if (opt && opt.dataset.name) nameEl.value = opt.dataset.name;
        });
        document.getElementById("saveArtifactBtn").addEventListener("click", function () {
          const name = nameEl.value.trim();
          if (!name) { T.toast("Name the artifact"); return; }
          const file = document.getElementById("artifactFile").files[0];
          const record = {
            name: name,
            kind: sel.value || "custom",
            stage: stage,
            fileName: file ? file.name : null,
            fileSize: file ? file.size : null,
            fileType: file ? file.type : null,
          };
          saveArtifact(record);
        });
      }

      function saveArtifact(a) {
        a.created = new Date().toISOString();
        deal.artifacts.unshift(a);
        const note = a.fileName ? "Uploaded " + a.fileName + " (" + a.name + ")" : "Added artifact: " + a.name;
        deal.activity.unshift({ at: a.created, text: note });
        api.save(deal);
        T.closeModal();
        T.toast(a.fileName ? "File attached" : "Artifact added");
        render();
      }

      function openCommitModal() {
        const v = DF.getVehicle(deal.vehicleType);
        T.modal("Commit to " + deal.name,
          '<div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">Soft-commit a check size. The position appears in your <a href="portfolio.html" style="color:inherit;text-decoration:underline">Portfolio</a>.</div>' +
          '<div style="background:var(--bg-base);border:1px solid var(--border-t);border-radius:4px;padding:10px 12px;margin-bottom:12px;font-size:12px;font-family:var(--mono);color:var(--text-secondary)">' +
            'Min check: ' + DF.fmtMoney(deal.terms.minCheck) + ' · Target raise: ' + DF.fmtMoney(deal.terms.targetRaise) +
          '</div>' +
          '<div><label>Commitment (USD)</label><input class="t-input" id="commitAmt" type="number" min="0" value="' + (deal.terms.minCheck || 25000) + '" style="width:100%" /></div>',
          { footer: '<button class="t-btn" data-modal-close>Cancel</button><button class="t-btn t-btn-primary" id="saveCommitBtn">Commit</button>' }
        );
        document.getElementById("saveCommitBtn").addEventListener("click", function () {
          const amt = parseFloat(document.getElementById("commitAmt").value || "0") || 0;
          if (amt <= 0) { T.toast("Enter an amount"); return; }
          if (deal.terms.minCheck && amt < deal.terms.minCheck) { T.toast("Below min check"); return; }
          const profileName = (window.DataBank.formatName && window.DataBank.formatName()) || "You";
          const pos = positions.create({
            dealId: deal.id,
            dealName: deal.name,
            sector: deal.sector,
            vehicleType: deal.vehicleType,
            commitment: amt,
            called: Math.round(amt * 0.25),
            distributed: 0,
            currentNav: Math.round(amt * 0.27),
            ownershipPct: deal.terms.targetRaise ? +(amt / deal.terms.targetRaise * 100).toFixed(2) : 0,
            status: "Soft commit",
            _investorName: profileName,
          });
          deal.investors.push({ positionId: pos.id, commitment: amt, at: pos.committedAt, status: "soft", name: profileName });
          deal.activity.unshift({ at: pos.committedAt, text: "Soft commit " + DF.fmtMoney(amt) + " from " + profileName });
          api.save(deal);
          T.closeModal();
          T.toast("Committed " + DF.fmtMoney(amt));
          render();
        });
      }

      function openEditTerms() {
        T.modal("Edit terms",
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">' +
            '<div><label>Mgmt fee (%)</label><input class="t-input" id="et-mgmt" type="number" step="0.25" value="' + deal.terms.mgmtFee + '" style="width:100%" /></div>' +
            '<div><label>Carry (%)</label><input class="t-input" id="et-carry" type="number" step="1" value="' + deal.terms.carry + '" style="width:100%" /></div>' +
            '<div><label>Min check</label><input class="t-input" id="et-min" type="number" value="' + deal.terms.minCheck + '" style="width:100%" /></div>' +
            '<div><label>Target raise</label><input class="t-input" id="et-raise" type="number" value="' + deal.terms.targetRaise + '" style="width:100%" /></div>' +
            '<div style="grid-column:1 / -1"><label>Target close</label><input class="t-input" id="et-close" type="date" value="' + DF.esc(deal.terms.closeDate) + '" style="width:100%" /></div>' +
          '</div>',
          { footer: '<button class="t-btn" data-modal-close>Cancel</button><button class="t-btn t-btn-primary" id="saveTerms">Save</button>' }
        );
        document.getElementById("saveTerms").addEventListener("click", function () {
          deal.terms.mgmtFee     = parseFloat(document.getElementById("et-mgmt").value || "0") || 0;
          deal.terms.carry       = parseFloat(document.getElementById("et-carry").value || "0") || 0;
          deal.terms.minCheck    = parseFloat(document.getElementById("et-min").value || "0") || 0;
          deal.terms.targetRaise = parseFloat(document.getElementById("et-raise").value || "0") || 0;
          deal.terms.closeDate   = document.getElementById("et-close").value || "";
          deal.activity.unshift({ at: new Date().toISOString(), text: "Terms updated" });
          api.save(deal);
          T.closeModal();
          T.toast("Terms saved");
          render();
        });
      }

      // Legacy 6-stage fund-vehicle renderer — wrap in try/catch so a missing field doesn't blank the page.
      try {
        render();
      } catch (err) {
        console.error("legacy render() failed for", deal.id, err);
        root.innerHTML = '<section class="panel" style="padding:24px"><div class="empty-title">Couldn\'t render this fund-vehicle deal</div><div style="font-size:13px;color:var(--text-secondary);margin-top:8px;line-height:1.5">This deal\'s data shape doesn\'t match the legacy 6-stage renderer. It may be a seeded deal that should use the v3 lifecycle view instead.<br/><br/><code style="font-family:var(--mono);font-size:11px;color:var(--down)">' + (err && err.message ? err.message : String(err)) + '</code></div><a class="t-btn t-btn-primary" href="deals.html" style="margin-top:16px">Back to deal room</a></section>';
      }
      document.documentElement.classList.add("is-ready");
    })();
  </script>
</body>
</html>
