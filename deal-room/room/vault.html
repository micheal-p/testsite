<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Data Vault · Deal Room</title>
  <link rel="icon" type="image/svg+xml" href="../assets/images/Coat_of_arms_of_Nigeria.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/custom.css" />
  <link rel="stylesheet" href="../assets/css/terminal.css" />
  <style>html:not(.is-ready) body{opacity:0}body{transition:opacity 180ms ease-out}</style>
</head>
<body>
  <div class="app-shell">
    <div data-workspace-shell data-active="vault"></div>

    <main class="workspace-content">
      <header style="margin-bottom:18px">
        <div style="font-size:11px;letter-spacing:0.18em;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px;font-weight:500">Encrypted · PIN-gated · audit-logged</div>
        <h1 style="font-family:var(--serif);font-size:36px;font-weight:400;color:var(--text-primary);letter-spacing:-0.025em;line-height:1.05">Data Vault</h1>
        <p style="font-size:14px;color:var(--text-secondary);margin-top:8px;line-height:1.5;max-width:62ch">Every document you sign on Deal Room is filed here automatically — subscription agreements, KYC attestations, token certificates, tax receipts, compliance approvals. Sealed with your 6-digit PIN, and access-logged the moment any file is opened.</p>
      </header>

      <div id="vaultRoot"></div>
    </main>
  </div>

  <script src="../assets/js/databank.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/terminal.js"></script>
  <script src="../assets/js/workspace.js"></script>
  <script src="../assets/js/dealflow.js"></script>
  <script>
    (function () {
      "use strict";
      const T = window.Terminal;
      const DB = window.DataBank;
      const vault = DB.vaultApi();
      const acctApi = DB.accountApi();
      let unlocked = false;
      let activeKind = "all";

      function esc(s) {
        return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
        });
      }

      function svgLock() {
        return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';
      }
      function svgUnlock() {
        return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0"/></svg>';
      }

      const KINDS = [
        { id: "all",                 label: "All docs",          icon: "•" },
        { id: "agreement",           label: "Subscription agreements", icon: "§" },
        { id: "kyc",                 label: "KYC attestations",  icon: "✓" },
        { id: "cert",                label: "Token certificates", icon: "◇" },
        { id: "compliance-approval", label: "Compliance certs",  icon: "✓" },
        { id: "receipt",             label: "Receipts",          icon: "$" },
        { id: "tax",                 label: "Tax documents",     icon: "T" },
        { id: "comms",               label: "Communications",    icon: "@" }
      ];

      function renderLocked() {
        const root = document.getElementById("vaultRoot");
        const count = vault.list().length;
        root.innerHTML = (
          '<section class="panel vault-locked-panel">' +
            '<div class="vault-locked">' +
              '<div class="vault-locked-icon">' + svgLock() + '</div>' +
              '<div class="vault-locked-title">Vault locked</div>' +
              '<div class="vault-locked-sub">' + count + ' document' + (count === 1 ? "" : "s") + ' inside. Enter your 6-digit PIN to unlock.</div>' +
              '<button class="t-btn t-btn-primary" type="button" id="vault-unlock">Unlock with PIN</button>' +
              '<div class="vault-locked-security">' +
                '<div>· AES-256 at rest · split-key (platform alone cannot decrypt)</div>' +
                '<div>· Every access is audit-logged (who · when · IP)</div>' +
                '<div>· 3 wrong PIN entries trigger a 24-hour cooldown</div>' +
                '<div>· Downloads are watermarked with your name + timestamp</div>' +
              '</div>' +
            '</div>' +
          '</section>'
        );
        document.getElementById("vault-unlock").addEventListener("click", function () {
          T.pinPad({
            title: "Unlock Data Vault",
            subtitle: "Your 6-digit transaction PIN is required to access encrypted documents.",
            onConfirm: function () {
              unlocked = true;
              T.toast("Vault unlocked.");
              renderUnlocked();
            }
          });
        });
      }

      function renderUnlocked() {
        const root = document.getElementById("vaultRoot");
        const all = vault.list();
        const filtered = activeKind === "all" ? all : all.filter(function (r) { return r.kind === activeKind; });
        const tabs = KINDS.map(function (k) {
          const count = k.id === "all" ? all.length : all.filter(function (r) { return r.kind === k.id; }).length;
          if (count === 0 && k.id !== "all") return "";
          const sel = activeKind === k.id ? " is-active" : "";
          return '<button class="vault-tab' + sel + '" type="button" data-vault-tab="' + k.id + '"><span class="vault-tab-label">' + k.label + '</span><span class="vault-tab-count">' + count + '</span></button>';
        }).filter(Boolean).join("");

        const profile = (DB.getProfile && DB.getProfile()) || {};
        const owner = (profile.firstName ? (profile.firstName + " " + (profile.lastName || "")).trim() : "Vault owner");

        const docs = filtered.length ? filtered.map(function (r) {
          const date = new Date(r.createdAt).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
          const time = new Date(r.createdAt).toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
          const kind = KINDS.find(function (k) { return k.id === r.kind; }) || { label: r.kind };
          const accessCount = (r.accessLog || []).length;
          return (
            '<div class="vault-doc">' +
              '<div class="vault-doc-glyph">' + (kind.icon || "•") + '</div>' +
              '<div class="vault-doc-body">' +
                '<div class="vault-doc-title">' + esc(r.title) + '</div>' +
                '<div class="vault-doc-sub">' + esc(r.subtitle || "") + '</div>' +
                '<div class="vault-doc-meta">' +
                  '<span class="vault-doc-kind">' + esc(kind.label) + '</span>' +
                  '<span>· filed ' + date + ' · ' + time + '</span>' +
                  '<span class="vault-doc-hash">· hash ' + esc(r.hash) + '</span>' +
                  (accessCount ? '<span>· ' + accessCount + ' access' + (accessCount === 1 ? '' : 'es') + '</span>' : '') +
                '</div>' +
              '</div>' +
              '<div class="vault-doc-actions">' +
                '<button class="t-btn" type="button" data-vault-open="' + r.id + '">Open</button>' +
              '</div>' +
            '</div>'
          );
        }).join("") : (
          '<div class="vault-empty">' +
            '<div class="empty-title">No documents in this category yet</div>' +
            '<div style="font-size:13px;color:var(--text-secondary);margin-top:8px">' +
              'Subscribe to a deal, complete KYC, or get a compliance certificate — items file here automatically.' +
            '</div>' +
            '<a class="t-btn t-btn-primary" href="deals.html" style="margin-top:14px">Browse deals →</a>' +
          '</div>'
        );

        root.innerHTML = (
          '<section class="panel">' +
            '<div class="vault-toolbar">' +
              '<div class="vault-unlocked-badge">' + svgUnlock() + '<span>Unlocked · ' + esc(owner) + '</span></div>' +
              '<div class="vault-tabs">' + tabs + '</div>' +
              '<button class="t-btn vault-relock" type="button" id="vault-lock">Lock</button>' +
            '</div>' +
            '<div class="vault-docs">' + docs + '</div>' +
          '</section>'
        );

        root.querySelectorAll("[data-vault-tab]").forEach(function (b) {
          b.addEventListener("click", function () { activeKind = b.getAttribute("data-vault-tab"); renderUnlocked(); });
        });
        root.querySelectorAll("[data-vault-open]").forEach(function (b) {
          b.addEventListener("click", function () { openDoc(b.getAttribute("data-vault-open")); });
        });
        document.getElementById("vault-lock").addEventListener("click", function () {
          unlocked = false; renderLocked();
        });
      }

      function openDoc(id) {
        const rec = vault.recordAccess(id, "self");
        if (!rec) return;
        const profile = (DB.getProfile && DB.getProfile()) || {};
        const owner = (profile.firstName ? (profile.firstName + " " + (profile.lastName || "")).trim() : "Vault owner");
        const watermark = "Deal Room Verified Copy · " + owner + " · " + new Date().toLocaleString("en-GB");
        const date = new Date(rec.createdAt).toLocaleString("en-GB");
        const kind = KINDS.find(function (k) { return k.id === rec.kind; }) || { label: rec.kind };

        // Render the doc body — different shape per kind, all wrapped in a watermarked frame.
        const body = (
          '<div class="vault-preview">' +
            '<div class="vault-watermark">' + esc(watermark) + '</div>' +
            '<div class="vault-preview-head">' +
              '<div class="vault-preview-eyebrow">' + esc(kind.label) + ' · filed ' + esc(date) + '</div>' +
              '<div class="vault-preview-title">' + esc(rec.title) + '</div>' +
              '<div class="vault-preview-sub">' + esc(rec.subtitle || "") + '</div>' +
            '</div>' +
            renderPayload(rec) +
            '<div class="vault-preview-foot">' +
              '<div><strong>Doc hash:</strong> ' + esc(rec.hash) + '</div>' +
              '<div><strong>Storage:</strong> AES-256 · split-key</div>' +
              '<div><strong>Filed:</strong> ' + esc(date) + '</div>' +
            '</div>' +
            renderAccessLog(rec) +
          '</div>'
        );
        // For Bilateral Subscription Agreements, the Download / Print button opens a real
        // print-styled standalone page. User saves as PDF via the browser's native print dialog.
        const isAgreement = rec.kind === "agreement" && rec.investmentId;
        const footer = isAgreement
          ? '<button class="t-btn" data-modal-close>Close</button>' +
            '<button class="t-btn t-btn-primary" id="vault-download">Open · Print / Save as PDF</button>'
          : '<button class="t-btn" data-modal-close>Close</button>' +
            '<button class="t-btn t-btn-primary" id="vault-download">Download watermarked PDF</button>';
        T.modal(rec.title, body, { footer: footer });
        document.getElementById("vault-download").addEventListener("click", function () {
          if (isAgreement) {
            // Open the printable agreement view; user prints/saves from there
            window.open("agreement.html?id=" + encodeURIComponent(rec.investmentId), "_blank");
          } else {
            T.toast("Watermarked PDF generation queued (demo mock).");
          }
        });
      }

      function renderPayload(rec) {
        const p = rec.payload || {};
        if (rec.kind === "agreement") {
          return (
            '<dl class="vault-kv">' +
              '<div><dt>Ticker</dt><dd>' + esc(p.ticker || "—") + '</dd></div>' +
              '<div><dt>Wrapper</dt><dd>' + esc(p.wrapper || "—") + '</dd></div>' +
              '<div><dt>Ticket</dt><dd>₦' + (p.ticketNGN || 0).toLocaleString() + '</dd></div>' +
              '<div><dt>Lane</dt><dd>' + esc(p.lane || "—") + '</dd></div>' +
              '<div><dt>Source of funds</dt><dd>' + esc(p.sourceOfFunds || "—") + '</dd></div>' +
              '<div><dt>Escrow</dt><dd>' + esc(p.escrow || "—") + '</dd></div>' +
              '<div><dt>Governing law</dt><dd>' + esc(p.governing || "—") + '</dd></div>' +
            '</dl>'
          );
        }
        if (rec.kind === "kyc") {
          return (
            '<dl class="vault-kv">' +
              '<div><dt>From tier</dt><dd>Tier ' + (p.fromTier || "—") + '</dd></div>' +
              '<div><dt>To tier</dt><dd>Tier ' + (p.toTier || "—") + '</dd></div>' +
              '<div><dt>Evidence</dt><dd>' + esc(p.evidenceLabel || p.evidence || "—") + '</dd></div>' +
            '</dl>'
          );
        }
        if (rec.kind === "receipt") {
          return (
            '<dl class="vault-kv">' +
              '<div><dt>Plan</dt><dd>' + esc(p.type || "—") + ' · ' + esc(p.cycle || "—") + '</dd></div>' +
              '<div><dt>Amount</dt><dd>₦' + (p.priceNGN || 0).toLocaleString() + ' · $' + (p.priceUSD || 0) + '</dd></div>' +
            '</dl>'
          );
        }
        if (rec.kind === "compliance-approval") {
          return (
            '<dl class="vault-kv">' +
              '<div><dt>Approved by</dt><dd>' + esc(p.approvedBy || "Compliance ops") + '</dd></div>' +
              '<div><dt>Approved at</dt><dd>' + (p.approvedAt ? new Date(p.approvedAt).toLocaleString("en-GB") : "—") + '</dd></div>' +
              '<div><dt>Statute</dt><dd>SEC Nigeria Crowdfunding Rules 2021 · DAOP 2022</dd></div>' +
            '</dl>'
          );
        }
        return '<div class="vault-empty-payload">Document payload preview unavailable for this kind.</div>';
      }

      function renderAccessLog(rec) {
        const log = (rec.accessLog || []).slice(0, 6);
        if (!log.length) return '';
        return (
          '<div class="vault-access">' +
            '<div class="vault-access-head">Access log</div>' +
            log.map(function (a) {
              return '<div class="vault-access-row">' +
                '<span class="vault-access-date">' + new Date(a.at).toLocaleString("en-GB") + '</span>' +
                '<span class="vault-access-who">' + esc(a.who) + '</span>' +
                '<span class="vault-access-ip">' + esc(a.ip || "—") + '</span>' +
              '</div>';
            }).join("") +
          '</div>'
        );
      }

      // Verified users get the gate; unverified get a hard-stop with paywall CTA.
      const acc = acctApi.get();
      if (!acc.verified) {
        document.getElementById("vaultRoot").innerHTML = (
          '<section class="panel"><div class="cmpl-empty" style="padding:40px 24px">' +
            '<div class="vault-locked-icon">' + svgLock() + '</div>' +
            '<div class="empty-title" style="margin-top:14px">Vault requires verification</div>' +
            '<div style="font-size:13px;color:var(--text-secondary);margin:8px 0 18px;max-width:50ch;margin-left:auto;margin-right:auto">v3 Part 10 — Data Vault is gated behind verification + 6-digit PIN. Verify your account to set a PIN and start filing.</div>' +
            '<button class="t-btn t-btn-primary" type="button" data-action="open-paywall">Verify account →</button>' +
          '</div></section>'
        );
        document.documentElement.classList.add("is-ready");
        return;
      }

      renderLocked();
      document.documentElement.classList.add("is-ready");
    })();
  </script>
</body>
</html>
