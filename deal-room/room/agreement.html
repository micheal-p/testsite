<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bilateral Subscription Agreement</title>
  <link rel="icon" type="image/svg+xml" href="../assets/images/Coat_of_arms_of_Nigeria.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root { --ink: #0A0A0A; --muted: #475569; --faint: #94a3b8; --line: #E7E5E0; --cream: #FBFAF6; --green: #15803D; --gold: #C9A227; --red: #B43A28; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #F4F2EC; font-family: Inter, system-ui, -apple-system, sans-serif; color: var(--ink); line-height: 1.55; }
    .toolbar { position: sticky; top: 0; z-index: 10; background: #FFFFFF; border-bottom: 1px solid var(--line); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .toolbar-meta { font-size: 12px; color: var(--muted); }
    .toolbar-meta strong { color: var(--ink); }
    .toolbar-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 6px; border: 1px solid var(--line); background: var(--ink); color: #FFFFFF; cursor: pointer; font: 500 13px Inter, system-ui, sans-serif; }
    .toolbar-btn:hover { background: #1F1F1F; }
    .toolbar-btn-ghost { background: #FFFFFF; color: var(--ink); }
    .toolbar-btn-ghost:hover { background: var(--cream); }
    .page { max-width: 820px; margin: 28px auto; padding: 56px 64px; background: #FFFFFF; border: 1px solid var(--line); box-shadow: 0 4px 24px rgba(15,23,42,0.06); position: relative; min-height: 1100px; }
    /* Watermark (visible on screen + print) */
    .watermark { position: absolute; inset: 0; pointer-events: none; user-select: none; overflow: hidden; z-index: 0; }
    .watermark span {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(-25deg);
      font-family: "Instrument Serif", Georgia, serif;
      font-size: 64px; color: rgba(15,23,42,0.04);
      white-space: nowrap; letter-spacing: 0.04em;
    }
    .page > * { position: relative; z-index: 1; }
    .doc-head { padding-bottom: 18px; border-bottom: 2px solid var(--ink); margin-bottom: 22px; }
    .doc-eyebrow { font-family: ui-monospace, "JetBrains Mono", monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--muted); margin-bottom: 8px; }
    .doc-title { font-family: "Instrument Serif", Georgia, serif; font-size: 36px; line-height: 1.1; letter-spacing: -0.02em; margin: 0; }
    .doc-meta { font-size: 12.5px; color: var(--muted); margin-top: 10px; line-height: 1.55; }
    .doc-state { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; margin-top: 12px; }
    .doc-state.pending { background: rgba(245,158,11,0.10); color: #92400E; border: 1px solid rgba(245,158,11,0.32); }
    .doc-state.executed { background: rgba(22,163,74,0.10); color: var(--green); border: 1px solid rgba(22,163,74,0.32); }
    .doc-state.declined { background: rgba(220,38,38,0.10); color: var(--red); border: 1px solid rgba(220,38,38,0.32); }
    section.clause { margin: 22px 0; }
    section.clause h2 { font-family: Inter, system-ui, sans-serif; font-size: 13px; text-transform: uppercase; letter-spacing: 0.10em; font-weight: 700; color: var(--ink); margin: 0 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--line); }
    .kv { display: grid; grid-template-columns: 200px 1fr; gap: 8px 22px; font-size: 13px; }
    .kv dt { color: var(--muted); font-weight: 600; }
    .kv dd { margin: 0; color: var(--ink); }
    .body-text { font-size: 13px; line-height: 1.65; color: var(--ink); }
    .body-text p { margin: 0 0 12px; }
    .risk-box { padding: 14px 16px; background: rgba(245,158,11,0.05); border-left: 4px solid var(--gold); border-radius: 0 6px 6px 0; }
    .risk-box p { margin: 0; font-size: 12.5px; line-height: 1.6; color: var(--ink); }
    .uop-list { list-style: none; padding: 0; margin: 0; }
    .uop-list li { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: baseline; padding: 6px 0; border-bottom: 1px dashed var(--line); font-size: 13px; }
    .uop-list li:last-child { border-bottom: 0; }
    .uop-pct { font-family: ui-monospace, monospace; font-weight: 700; color: var(--ink); }
    .uop-amt { font-family: ui-monospace, monospace; color: var(--muted); }
    .sig-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; margin-top: 8px; }
    .sig-box { padding: 18px; border: 1.5px solid var(--ink); border-radius: 6px; min-height: 130px; display: flex; flex-direction: column; justify-content: space-between; }
    .sig-box.pending { border-style: dashed; border-color: var(--gold); background: rgba(245,158,11,0.03); }
    .sig-box-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); font-weight: 700; margin-bottom: 8px; }
    .sig-name { font-family: "Instrument Serif", Georgia, serif; font-size: 22px; color: var(--ink); margin: 0; line-height: 1.2; }
    .sig-mode { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .sig-time { font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted); margin-top: 12px; }
    .sig-pending-text { font-size: 12px; color: #92400E; font-style: italic; }
    .footer-band { margin-top: 36px; padding-top: 16px; border-top: 1px solid var(--line); font-size: 10.5px; color: var(--faint); font-family: ui-monospace, monospace; display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .err { padding: 40px 20px; text-align: center; color: var(--muted); }

    /* Print stylesheet — hide toolbar, lift page chrome */
    @media print {
      html, body { background: #FFFFFF; }
      .toolbar { display: none !important; }
      .page { box-shadow: none; border: 0; margin: 0 auto; padding: 28mm 22mm; page-break-inside: auto; min-height: 0; max-width: none; }
      .watermark span { color: rgba(15,23,42,0.05); }
      section.clause { page-break-inside: avoid; }
      .sig-grid { page-break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div class="toolbar" id="toolbar">
    <div class="toolbar-meta">
      <strong>Bilateral Subscription Agreement</strong>
      <span id="meta-ticker"></span>
      <span id="meta-state"></span>
    </div>
    <div style="display:flex;gap:8px">
      <button class="toolbar-btn toolbar-btn-ghost" type="button" onclick="window.close()">Close</button>
      <button class="toolbar-btn" type="button" id="print-btn" onclick="window.print()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print / Save as PDF
      </button>
    </div>
  </div>

  <article class="page" id="docRoot">
    <div class="err">Loading agreement…</div>
  </article>

  <script src="../assets/js/databank.js"></script>
  <script src="../assets/js/data.js"></script>
  <script>
    (function () {
      "use strict";
      const DB = window.DataBank;
      const D = window.DataBankData;
      const params = new URLSearchParams(location.search);
      const invId = params.get("id");

      function esc(s) {
        return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
        });
      }
      function fmtNgn(n) {
        n = +n; if (!n || isNaN(n)) return "—";
        if (n >= 1e9) return "₦" + (n / 1e9).toFixed(2) + "bn";
        if (n >= 1e6) return "₦" + (n / 1e6).toFixed(0) + "m";
        if (n >= 1e3) return "₦" + (n / 1e3).toFixed(0) + "k";
        return "₦" + n;
      }
      function fail(msg) {
        document.getElementById("docRoot").innerHTML = '<div class="err">' + msg + '</div>';
      }

      if (!invId) { fail("Missing ?id parameter."); return; }
      const inv = DB.investmentsApi().list().find(function (i) { return i.id === invId; });
      if (!inv) { fail("Subscription not found."); return; }
      // Find the deal — try dealsApi first (mutations + user-created), fall back to seeded D.deals
      const deal = DB.dealsApi().get(inv.dealId) || (D.deals.find(function (d) { return d.id === inv.dealId; })) || null;
      if (!deal) { fail("Deal record not found for this subscription."); return; }

      const profile = (DB.getProfile && DB.getProfile()) || {};
      const investorName = inv.investorName || (profile.firstName ? (profile.firstName + " " + (profile.lastName || "")).trim() : "Demo Investor");
      const investorEmail = profile.email || "investor@demo.ng";
      const investorTier = inv.kycTierAtSign || (deal.lane === "lane-b" ? 3 : 2);
      const today = new Date().toLocaleDateString("en-GB", { day: "2-digit", month: "long", year: "numeric" });
      const signedDate = new Date(inv.signedAt).toLocaleString("en-GB");
      const countersignedDate = inv.countersignedAt ? new Date(inv.countersignedAt).toLocaleString("en-GB") : null;

      const stateLabel = inv.countersignState === "accepted" ? "Fully executed"
                       : inv.countersignState === "declined" ? "Declined"
                       : "Pending issuer countersign";
      const stateClass = inv.countersignState === "accepted" ? "executed"
                       : inv.countersignState === "declined" ? "declined"
                       : "pending";

      document.title = "Bilateral Subscription Agreement · " + (deal.ticker || deal.company);
      document.getElementById("meta-ticker").textContent = " · " + (deal.ticker || "");
      document.getElementById("meta-state").innerHTML = ' · <strong>' + esc(stateLabel) + '</strong>';

      // Build use-of-proceeds block (Lane A has array; Lane B has text only)
      let uop = "";
      if (Array.isArray(deal.useOfProceeds) && deal.useOfProceeds.length) {
        uop = '<ul class="uop-list">' + deal.useOfProceeds.map(function (u) {
          return '<li><span>' + esc(u.label) + '</span><span class="uop-pct">' + u.pctRaise + '%</span><span class="uop-amt">' + fmtNgn(u.ngn) + '</span></li>';
        }).join("") + '</ul>';
      } else if (deal.useOfProceedsText) {
        uop = '<p class="body-text">' + esc(deal.useOfProceedsText) + '</p>';
      } else {
        uop = '<p class="body-text" style="color:var(--muted);font-style:italic">No use-of-proceeds breakdown on file.</p>';
      }

      // Wrapper-specific instrument terms
      const wrapperBlock = deal.wrapper === "CSAFE"
        ? '<dl class="kv">' +
            '<dt>Instrument</dt><dd>Convertible SAFE (CSAFE), Nigeria-compliant. Converts to equity on the next qualified financing event.</dd>' +
            '<dt>Valuation cap</dt><dd>' + fmtNgn((deal.valuationCapNGN) || ((deal.raiseNGN || 50000000) * 5)) + '</dd>' +
            '<dt>Discount rate</dt><dd>' + (deal.discountPct || 20) + '% to next-round price</dd>' +
            '<dt>MFN clause</dt><dd>Investor entitled to most-favoured-nation terms if better terms granted to subsequent CSAFE holders.</dd>' +
            '<dt>Anti-dilution</dt><dd>Broad-based weighted-average.</dd>' +
            '<dt>Information rights</dt><dd>Quarterly MD&amp;A report, annual audited financials, cap-table snapshot.</dd>' +
          '</dl>'
        : '<dl class="kv">' +
            '<dt>Instrument</dt><dd>' + esc(deal.wrapper || "—") + ' (Lane B private placement)</dd>' +
            '<dt>Terms</dt><dd>As set out in the Private Placement Memorandum filed with SEC Nigeria.</dd>' +
            '<dt>Tenor / coupon</dt><dd>Per wrapper-specific schedule attached.</dd>' +
          '</dl>';

      // Signature blocks
      const investorSig = (
        '<div class="sig-box">' +
          '<div>' +
            '<div class="sig-box-label">Investor</div>' +
            '<h3 class="sig-name">' + esc(investorName) + '</h3>' +
            '<div class="sig-mode">Signed with 6-digit transaction PIN</div>' +
          '</div>' +
          '<div class="sig-time">' + signedDate + '</div>' +
        '</div>'
      );
      const issuerSig = inv.countersignState === "accepted"
        ? ('<div class="sig-box">' +
             '<div>' +
               '<div class="sig-box-label">Issuer · dual-signatory countersign</div>' +
               '<h3 class="sig-name">' + esc(deal.legalName || deal.company) + '</h3>' +
               '<div class="sig-mode">Countersigned by ' + (inv.countersignedBy || ["Signatory 1", "Signatory 2"]).map(esc).join(" + ") + '</div>' +
             '</div>' +
             '<div class="sig-time">' + countersignedDate + '</div>' +
           '</div>')
        : inv.countersignState === "declined"
        ? ('<div class="sig-box pending" style="border-color:var(--red);background:rgba(220,38,38,0.03)">' +
             '<div>' +
               '<div class="sig-box-label" style="color:var(--red)">Issuer · declined</div>' +
               '<h3 class="sig-name">' + esc(deal.legalName || deal.company) + '</h3>' +
               '<div class="sig-pending-text" style="color:var(--red)">Reason: ' + esc(inv.declineReason || "—") + '</div>' +
             '</div>' +
             '<div class="sig-time">' + countersignedDate + '</div>' +
           '</div>')
        : ('<div class="sig-box pending">' +
             '<div>' +
               '<div class="sig-box-label">Issuer · pending dual-signatory countersign</div>' +
               '<h3 class="sig-name">' + esc(deal.legalName || deal.company) + '</h3>' +
               '<div class="sig-pending-text">v3 Part 3 requires both authorized signatories to countersign. Until then this agreement is not executed.</div>' +
             '</div>' +
             '<div class="sig-time">—</div>' +
           '</div>');

      document.getElementById("docRoot").innerHTML = (
        '<div class="watermark"><span>Deal Room · Verified Copy</span></div>' +
        '<header class="doc-head">' +
          '<div class="doc-eyebrow">Bilateral Subscription Agreement · ' + esc(deal.laneLabel || "") + '</div>' +
          '<h1 class="doc-title">' + esc(deal.legalName || deal.company) + ' &mdash; ' + esc(deal.ticker || "") + '</h1>' +
          '<div class="doc-meta">Dated ' + today + ' · Governing law: Federal Republic of Nigeria · Jurisdiction: FCT, Abuja' +
            '<br/>Doc ID: <code>' + esc(inv.id) + '</code>' +
          '</div>' +
          '<span class="doc-state ' + stateClass + '">' + esc(stateLabel) + '</span>' +
        '</header>' +

        '<section class="clause">' +
          '<h2>1. Issuer</h2>' +
          '<dl class="kv">' +
            '<dt>Legal name</dt><dd>' + esc(deal.legalName || deal.company) + '</dd>' +
            '<dt>Trading name</dt><dd>' + esc(deal.tradingName || deal.company) + ' (' + esc(deal.ticker || "") + ')</dd>' +
            '<dt>CAC RC</dt><dd>RC-' + (1000000 + ((deal.ticker || "NRG").charCodeAt(0) * 137 % 900000)) + '</dd>' +
            '<dt>TIN</dt><dd>' + (12340000 + ((deal.ticker || "NRG").charCodeAt(0) * 19)) + '-0001</dd>' +
            '<dt>Sector</dt><dd>' + esc(deal.sector || "—") + '</dd>' +
            '<dt>Auditor</dt><dd>' + esc(deal.auditor || (deal.lane === "lane-a" ? "BDO Nigeria (FRCN registered)" : "KPMG Nigeria (FRCN registered)")) + '</dd>' +
            '<dt>Lane</dt><dd>' + esc(deal.laneLabel || "—") + '</dd>' +
          '</dl>' +
        '</section>' +

        '<section class="clause">' +
          '<h2>2. Investor</h2>' +
          '<dl class="kv">' +
            '<dt>Legal name</dt><dd>' + esc(investorName) + '</dd>' +
            '<dt>Email</dt><dd>' + esc(investorEmail) + '</dd>' +
            '<dt>NIN (verified)</dt><dd>••••-••••-' + (Math.abs(((investorEmail || "").charCodeAt(0) || 65) * 1337) % 9000 + 1000) + '</dd>' +
            '<dt>BVN-verified bank</dt><dd>Access Bank ••••••' + (Math.abs(((investorEmail || "").charCodeAt(1) || 90) * 421) % 9000 + 1000) + '</dd>' +
            '<dt>KYC tier</dt><dd>Tier ' + investorTier + '</dd>' +
            '<dt>Accreditation</dt><dd>' + (investorTier >= 3 ? "Qualified (Lane B eligible)" : "Retail (Lane A eligible)") + '</dd>' +
          '</dl>' +
        '</section>' +

        '<section class="clause">' +
          '<h2>3. What this raise funds</h2>' +
          (deal.brief ? '<p class="body-text">' + esc(deal.brief) + '</p>' : '') +
          uop +
        '</section>' +

        '<section class="clause">' +
          '<h2>4. Subscription</h2>' +
          '<dl class="kv">' +
            '<dt>Ticket size</dt><dd>' + fmtNgn(inv.ticketNGN) + '</dd>' +
            '<dt>Source of funds</dt><dd>' + esc(inv.sourceOfFunds || "—") + '</dd>' +
            '<dt>Escrow custodian</dt><dd>Stanbic IBTC Bank (CBN-licensed)</dd>' +
            '<dt>Payment rail</dt><dd>NIBSS Instant Payment (NIP)</dd>' +
            (inv.payment ? '<dt>Reference code</dt><dd><code>' + esc(inv.payment.refCode) + '</code></dd>' : '') +
            (inv.payment ? '<dt>Escrow account</dt><dd><code>' + esc(inv.payment.escrowAcct) + '</code></dd>' : '') +
            '<dt>Cooling-off</dt><dd>14 days from execution (full countersign)</dd>' +
          '</dl>' +
        '</section>' +

        '<section class="clause">' +
          '<h2>5. Instrument terms</h2>' +
          wrapperBlock +
        '</section>' +

        '<section class="clause">' +
          '<h2>6. SEC-mandated risk disclosure</h2>' +
          '<div class="risk-box"><p>Crowdfunding and private placement investments carry substantial risk, including total loss of capital. Past performance is not indicative of future results. This investment is illiquid; tokens are non-transferable until conversion or SEC-approved secondary window. The issuer has been verified by Deal Room compliance but Deal Room does not guarantee returns. You have a 14-day cooling-off period from the date of full execution during which you may withdraw without penalty; thereafter the subscription is binding subject to escrow threshold and SEC rules.</p></div>' +
        '</section>' +

        '<section class="clause">' +
          '<h2>7. Signatures</h2>' +
          '<div class="sig-grid">' + investorSig + issuerSig + '</div>' +
        '</section>' +

        '<div class="footer-band">' +
          '<span>Doc hash: ' + (function () {
            const seed = inv.id + "|" + deal.id + "|" + inv.signedAt;
            let h = 5381; for (let i = 0; i < seed.length; i++) h = ((h << 5) + h + seed.charCodeAt(i)) >>> 0;
            return ("00000000" + h.toString(16)).slice(-8);
          })() + '</span>' +
          '<span>Deal Room · ' + esc(deal.lane === "lane-b" ? "Private Placement" : (deal.lane === "lane-a" ? "Growth Capital" : "Fund Vehicle")) + '</span>' +
          '<span>Page 1 of 1</span>' +
        '</div>'
      );
    })();
  </script>
</body>
</html>
