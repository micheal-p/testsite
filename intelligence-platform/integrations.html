<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrations | NEIIA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0B1F24;
            --bg-body: #f3f4f6;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --accent: #A3E635;
            --danger: #ef4444;
            --success: #10b981;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background-color: var(--primary); /* Dark sleek background */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-main);
            padding: 20px;
        }
        .modal-card {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .close-btn {
            background: #f3f4f6;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .close-btn:hover {
            background: #e5e7eb;
            color: var(--text-main);
        }
        .modal-body {
            padding: 24px;
        }
        .setting-group {
            margin-bottom: 20px;
        }
        .setting-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .setting-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-main);
        }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .setting-row:last-child { border-bottom: none; }
        .setting-info h4 { font-size: 14px; margin-bottom: 2px; }
        .setting-info p { font-size: 12px; color: var(--text-muted); }
        
        /* Toggle Switch */
        .toggle {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); }
        
        .modal-footer {
            padding: 16px 24px;
            background: var(--bg-body);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            border-top: 1px solid var(--border);
        }
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            border: none;
        }
        .btn-outline { background: white; border: 1px solid var(--border); color: var(--text-main); }
        .btn-primary { background: var(--primary); color: white; }
    </style>
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">
</head>
<body>

    <div class="modal-card">
        <div class="modal-header">
            <h2><i class="fas fa-plug"></i> Integrations</h2>
            <a href="javascript:history.back()" class="close-btn"><i class="fas fa-times"></i></a>
        </div>
        <div class="modal-body">
            
            <div class="setting-row">
                <div class="setting-info" style="display:flex; align-items:center; gap:12px;">
                    <i class="fab fa-aws" style="font-size:24px; color:#FF9900;"></i>
                    <div>
                        <h4>AWS IoT Core Core</h4>
                        <p>Sync live sensor data</p>
                    </div>
                </div>
                <span style="color:var(--success); font-size:12px; font-weight:600;"><i class="fas fa-check-circle"></i> Connected</span>
            </div>
            <div class="setting-row">
                <div class="setting-info" style="display:flex; align-items:center; gap:12px;">
                    <div style="width:24px; height:24px; background:#0F9D58; border-radius:4px; display:flex; align-items:center; justify-content:center; color:white; font-size:12px; font-weight:bold;">E</div>
                    <div>
                        <h4>NEIIA Enterprise DB</h4>
                        <p>Central policy sync</p>
                    </div>
                </div>
                <span style="color:var(--success); font-size:12px; font-weight:600;"><i class="fas fa-check-circle"></i> Connected</span>
            </div>
            <div class="setting-row">
                <div class="setting-info" style="display:flex; align-items:center; gap:12px;">
                    <i class="fab fa-slack" style="font-size:24px; color:#4A154B;"></i>
                    <div>
                        <h4>Slack Alerts</h4>
                        <p>Send risk alerts to #esg-ops</p>
                    </div>
                </div>
                <button class="btn btn-outline" style="padding:4px 12px; font-size:11px;">Connect</button>
            </div>
            <div class="setting-row">
                <div class="setting-info" style="display:flex; align-items:center; gap:12px;">
                    <i class="fas fa-satellite" style="font-size:24px; color:var(--info);"></i>
                    <div>
                        <h4>Sentinel-2 API</h4>
                        <p>Spatial tracking imagery</p>
                    </div>
                </div>
                <button class="btn btn-outline" style="padding:4px 12px; font-size:11px;">Connect</button>
            </div>
        
        </div>
        <div class="modal-footer">
            <a href="javascript:history.back()" class="btn btn-outline">Cancel</a>
            <button class="btn btn-primary" onclick="history.back()">Save Changes</button>
        </div>
    </div>


    <script>
        // Close sidebar when clicking outside
        document.addEventListener('click', function(e) {
            const sidebar = document.querySelector('.sidebar');
            const sidebarBtn = document.querySelector('.mobile-sidebar-btn');
            
            if (sidebar && sidebar.classList.contains('mobile-open')) {
                // If the click is NOT inside the sidebar and NOT on the toggle button
                if (!sidebar.contains(e.target) && (!sidebarBtn || !sidebarBtn.contains(e.target))) {
                    sidebar.classList.remove('mobile-open');
                }
            }
        });
    </script>
</body>
</html>
