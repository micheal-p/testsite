<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Energy Assets | NEIIA</title>
    <meta name="description" content="Sign in to your NEIIA energy trading account.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-page { display: flex; align-items: center; justify-content: center; padding: 120px 20px 60px; position: relative; }
        .auth-page::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at 30% 50%, rgba(0,99,65,0.1) 0%, transparent 50%), radial-gradient(ellipse at 70% 20%, rgba(163,230,53,0.06) 0%, transparent 50%); pointer-events: none; }
        .auth-card { position: relative; z-index: 1; width: 100%; max-width: 440px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 48px 40px; margin: 0 auto; }
        .auth-card h1 { font-size: 28px; font-weight: 700; color: var(--text-white); margin-bottom: 8px; text-align: center; }
        .auth-card .auth-sub { font-size: 15px; color: var(--text-muted); text-align: center; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.3px; }
        .form-input { width: 100%; padding: 14px 16px; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 10px; color: var(--text-white); font-size: 15px; transition: var(--transition); font-family: var(--font-family); }
        .form-input:focus { outline: none; border-color: var(--green-accent); box-shadow: 0 0 0 3px rgba(163,230,53,0.1); }
        .form-input::placeholder { color: var(--text-dim); }
        .btn-submit { width: 100%; padding: 16px; background: var(--green-accent); color: var(--bg-dark); border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: var(--transition); font-family: var(--font-family); margin-top: 8px; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(163,230,53,0.25); }
        .auth-footer { text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-dim); }
        .auth-footer a { color: var(--green-accent); font-weight: 600; }
        .form-error { display: none; color: var(--red); font-size: 13px; margin-top: 8px; text-align: center; }
        .form-row-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .form-row-between a { color: var(--green-accent); font-size: 13px; font-weight: 600; }
        .remember-label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-dim); cursor: pointer; }
        .remember-label input { accent-color: var(--green-accent); }
        @media (max-width: 480px) { .auth-card { padding: 32px 24px; } }
    </style>
    <link rel="icon" type="image/svg+xml" href="../assets/images/Coat_of_arms_of_Nigeria.svg" sizes="50x50">
</head>

<body>
    <!-- Logo -->
    <a href="index.html" class="logo-fixed">
        <div class="logo-wrapper">
            <img src="../assets/images/neiis-logo-green.png" alt="NEIIA Logo" class="brand-logo light-mode-logo" style="max-width: 120px;">
            <img src="../assets/images/neiih_logo_white.png" alt="NEIIA Logo" class="brand-logo dark-mode-logo" style="max-width: 120px;">
            <!-- <div class="brand-text">NATIONAL ENERGY INVESTMENT & INTELLIGENCE ADMINISTRATION</div> -->
        </div>
    </a>

    <section class="auth-page">
        <div class="auth-card">
            <h1>Welcome back</h1>
            <p class="auth-sub">Sign in to your trading account</p>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" id="login-email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="login-password" placeholder="Enter your password" required>
                </div>
                <div class="form-row-between">
                    <label class="remember-label"><input type="checkbox"> Remember me</label>
                    <a href="#">Forgot password?</a>
                </div>
                <p class="form-error" id="login-error">Invalid email or password. Please try again.</p>
                <button type="submit" class="btn-submit">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Create one</a>
            </div>
        </div>
    </section>

    <script src="app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const users = JSON.parse(localStorage.getItem('ea_users') || '[]');
            const user = users.find(u => u['Email Address'] === email);

            if (user) {
                localStorage.setItem('ea_current_user', JSON.stringify(user));
                if (user.status === 'pending') {
                    alert('Your account is still pending approval. Please check back later.');
                    return;
                }
                window.location.href = 'dashboard.html';
            } else {
                // Demo admin login
                if (email === 'admin@neiia.gov.ng' && password === 'admin') {
                    localStorage.setItem('ea_current_user', JSON.stringify({ type: 'admin', 'Email Address': email, status: 'approved' }));
                    window.location.href = 'admin.html';
                    return;
                }
                document.getElementById('login-error').style.display = 'block';
            }
        });
    </script>
</body>
</html>
