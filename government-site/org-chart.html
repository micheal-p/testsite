<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Org chart · Energy Stakeholder Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="assets/css/stakeholder.css">
</head>
<body>

<header class="shell-header"></header>

<div class="shell" style="padding:24px 20px;">
  <div class="section-h">
    <div>
      <h2 style="margin:0;">Reporting hierarchy</h2>
      <p style="margin:4px 0 0;color:var(--muted);font-size:13px;">Presidency → Ministries → Regulators → Operators → Ecosystem. Click any node to open its profile.</p>
    </div>
  </div>

  <div class="org-tree" id="orgTree"></div>
</div>

<div class="toast-wrap"></div>
<div class="panel-backdrop" id="entityBackdrop"></div>
<aside class="entity-panel" id="entityPanel"></aside>

<script src="assets/js/entities.js"></script>
<script src="assets/js/app.js"></script>
<script>
  injectHeader('org-chart');

  function byId(id) { return NEIIA_ENTITIES.find(function (e) { return e.id === id; }); }

  function leafButton(id) {
    var e = byId(id);
    if (!e) return '';
    var color = NEIIA_META.subSectorColor(e.subSector);
    var dissolved = (e.status === 'dissolved' || e.status === 'merged') ? ' dissolved' : '';
    return '<button class="org-leaf' + dissolved + '" data-id="' + e.id + '">' +
      '<span class="color-dot" style="background:' + color + ';"></span>' +
      '<span class="leaf-acronym">' + e.acronym + '</span>' +
      '<span class="leaf-name">' + e.name + '</span>' +
    '</button>';
  }

  function branch(title, kids, openByDefault) {
    return '<details class="org-branch"' + (openByDefault ? ' open' : '') + '>' +
      '<summary>' + title + '</summary>' +
      '<div class="org-children">' + kids + '</div>' +
    '</details>';
  }

  var html =
    branch('Presidency / Office of the President',
      branch('Federal Ministry of Power',
        leafButton('fmp') +
        leafButton('nerc') + leafButton('tcn') + leafButton('nbet') + leafButton('rea') +
        leafButton('nemsa') + leafButton('ndphc') + leafButton('nelmco') + leafButton('nipp') +
        branch('Distribution Companies (DisCos)',
          leafButton('aedc') + leafButton('bedc') + leafButton('ekedc') + leafButton('eedc') +
          leafButton('ibedc') + leafButton('ikedc') + leafButton('jed') + leafButton('kaedco') +
          leafButton('kedco') + leafButton('phed') + leafButton('yedc')
        ) +
        branch('Generation Companies (GenCos)',
          leafButton('egbin') + leafButton('kainji') + leafButton('shiroro') + leafButton('sapele') + leafButton('geregu')
        ), true
      ) +
      branch('Federal Ministry of Petroleum Resources',
        leafButton('fmpr') + leafButton('nuprc') + leafButton('nmdpra') + leafButton('nnpcl') + leafButton('ncdmb') +
        branch('Legacy (dissolved or merged)',
          leafButton('pef') + leafButton('dpr') + leafButton('pppra')
        )
      ) +
      branch('Federal Ministry of Environment',
        leafButton('fme') + leafButton('nesrea') + leafButton('sgbic')
      ) +
      branch('Federal Ministry of Budget &amp; Economic Planning',
        leafButton('fmbep')
      ) +
      branch('National Council on Climate Change',
        leafButton('nccc')
      ) +
      branch('Federal Ministry of Innovation, Science &amp; Technology',
        leafButton('ecn') + leafButton('naseni')
      ) +
      branch('Federal Ministry of Industry, Trade &amp; Investment',
        leafButton('son')
      ) +
      branch('Federal Ministry of Interior',
        leafButton('ffs')
      ) +
      branch('Federal Ministry of Finance Incorporated',
        leafButton('boi') + leafButton('nsia') + leafButton('nexim') + leafButton('infrabank')
      ) +
      branch('Central Bank of Nigeria',
        leafButton('cbn')
      ) +
      branch('Multilateral-backed national DFIs',
        leafButton('dbn') + leafButton('nidf')
      )
    , true) +

    branch('State Government Bodies',
      branch('State Electricity Regulatory Commissions',
        leafButton('lserc') + leafButton('eserc') + leafButton('enserc') + leafButton('onerc') + leafButton('kdsera')
      )
    ) +

    branch('External Ecosystem',
      branch('Industry associations',
        leafButton('apgc') + leafButton('aned') + leafButton('rean') + leafButton('nga') +
        leafButton('pengassan') + leafButton('opts') + leafButton('ipman') + leafButton('moman') + leafButton('nse-energy')
      ) +
      branch('Renewables coordination',
        leafButton('nrep')
      ) +
      branch('Research &amp; academic',
        leafButton('ncerd') + leafButton('cert') + leafButton('erclag')
      ) +
      branch('DFIs &amp; development partners',
        leafButton('worldbank-ng') + leafButton('ifc-ng') + leafButton('afdb-ng') + leafButton('afc') +
        leafButton('usaid-pa') + leafButton('giz-nesp') + leafButton('fcdo-ng') + leafButton('eu-ng') + leafButton('undp-ng')
      )
    );

  document.getElementById('orgTree').innerHTML = html;

  document.querySelectorAll('.org-leaf').forEach(function (b) {
    b.addEventListener('click', function () {
      var ent = byId(b.dataset.id);
      if (ent) openEntityPanel(ent);
    });
  });
</script>
</body>
</html>
