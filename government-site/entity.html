<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entity profile · Energy Stakeholder Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="assets/css/stakeholder.css">
</head>
<body>

<header class="shell-header no-print"></header>

<main id="profileRoot"></main>

<div class="toast-wrap"></div>

<script src="assets/js/entities.js"></script>
<script src="assets/js/app.js"></script>
<script>
  injectHeader(null);

  var id = new URLSearchParams(location.search).get('id');
  var e = NEIIA_ENTITIES.find(function (x) { return x.id === id; });
  var root = document.getElementById('profileRoot');

  if (!e) {
    root.innerHTML = '<div class="shell" style="padding:40px;"><h1>Entity not found</h1><p>No entity matches that ID.</p><a class="btn btn-primary" href="directory.html">Back to directory</a></div>';
  } else {
    var color = NEIIA_META.subSectorColor(e.subSector);
    var isInternal = window.NEIIA_VIEW_MODE === 'internal';

    var leadership = (e.leadership || []).map(function (l) { return '<li><strong>' + l.title + ':</strong> ' + l.name + '</li>'; }).join('') || '<li>Not on file.</li>';
    var phones = (e.phones || []).filter(Boolean).join(', ') || '—';
    var emails = (e.emails || []).filter(Boolean).map(function (x) { return '<a class="link" href="mailto:' + x + '">' + x + '</a>'; }).join(', ') || '—';
    var web = e.website ? '<a class="link" href="' + e.website + '" target="_blank" rel="noopener">' + e.website.replace(/^https?:\/\//, '') + '</a>' : '—';
    var programs = (e.programs || []).map(function (p) { return '<li>' + p + '</li>'; }).join('') || '<li>None on file.</li>';
    var jurisdiction = (e.jurisdiction || []).map(function (j) { return '<span class="sub-chip outline">' + j + '</span>'; }).join(' ') || '—';
    var soc = e.social || {};
    var socials = [];
    if (soc.linkedin) socials.push('<a class="link" href="https://linkedin.com/' + soc.linkedin + '" target="_blank">LinkedIn</a>');
    if (soc.twitter) socials.push('<a class="link" href="https://x.com/' + soc.twitter + '" target="_blank">X / Twitter</a>');
    if (soc.facebook) socials.push('<a class="link" href="https://facebook.com/' + soc.facebook + '" target="_blank">Facebook</a>');
    var socialsHtml = socials.length ? socials.join(' · ') : '—';

    var contactsBlock = (isInternal && e.contacts && e.contacts.length) ?
      '<div class="card"><h3>Key contacts</h3><ul>' + e.contacts.map(function (c) {
        return '<li><strong>' + c.name + '</strong> — ' + (c.title || '') + (c.email ? ' · <a class="link" href="mailto:' + c.email + '">' + c.email + '</a>' : '') + '</li>';
      }).join('') + '</ul></div>' : '';

    var neiiaBlock = isInternal ?
      '<div class="card"><h3>NEIIA relevance</h3><dl class="kv"><dt>Relevance</dt><dd>' + e.neiiaRelevance + '</dd><dt>Priority</dt><dd><span class="priority-chip priority-' + e.neiiaPriority + '">' + e.neiiaPriority + '</span></dd></dl></div>' : '';

    var statusBlock = e.statusNote ?
      '<div class="card"><h3>Status note</h3><p>' + e.statusNote + '</p></div>' : '';

    var statusBadge = e.status === 'active' ?
      '<span class="status-chip status-active">Active</span>' :
      '<span class="status-chip status-' + e.status + '">' + e.status.charAt(0).toUpperCase() + e.status.slice(1) + '</span>';

    root.innerHTML =
      '<section class="entity-hero" style="border-top:4px solid ' + color + ';">' +
        '<div class="shell">' +
          '<a href="directory.html" class="no-print" style="color:var(--muted);font-size:13px;display:inline-block;margin-bottom:14px;">← Back to directory</a>' +
          '<div class="hero-inner">' +
            '<div class="acronym-circle-lg" style="background:' + color + ';">' + e.acronym + '</div>' +
            '<div style="flex:1;">' +
              '<div class="acronym-big">' + e.acronym + '</div>' +
              '<h1>' + e.name + '</h1>' +
              '<div class="chip-row">' +
                '<span class="sub-chip" style="background:' + color + '15;color:' + color + ';"><span class="color-dot" style="background:' + color + ';"></span>' + NEIIA_META.subSectorLabel(e.subSector) + '</span>' +
                '<span class="sub-chip outline">' + e.role + '</span>' +
                statusBadge +
                (isInternal ? '<span class="priority-chip priority-' + e.neiiaPriority + '">Priority: ' + e.neiiaPriority + '</span>' : '') +
              '</div>' +
            '</div>' +
            '<button class="btn btn-secondary no-print" onclick="window.print()">' + icon('print', 14) + ' Print one-pager</button>' +
          '</div>' +
        '</div>' +
      '</section>' +

      '<section class="shell">' +
        '<div class="entity-grid">' +
          '<div>' +
            '<div class="card"><h3>Mandate</h3><p>' + (e.mandate || '—') + '</p></div>' +
            '<div class="card"><h3>Leadership</h3><ul>' + leadership + '</ul></div>' +
            '<div class="card"><h3>Active programs &amp; initiatives</h3><ul>' + programs + '</ul></div>' +
            '<div class="card"><h3>Governance</h3><dl class="kv">' +
              '<dt>Established</dt><dd>' + (e.established || '—') + '</dd>' +
              '<dt>Enabling law</dt><dd>' + (e.enablingLaw || '—') + '</dd>' +
              '<dt>Reports to</dt><dd>' + (e.reportsTo || '—') + '</dd>' +
              '<dt>Jurisdiction</dt><dd>' + jurisdiction + '</dd>' +
              '<dt>Status</dt><dd>' + statusBadge + '</dd>' +
            '</dl></div>' +
            statusBlock +
            (isInternal && e.notes ? '<div class="card"><h3>Internal notes</h3><p>' + e.notes + '</p></div>' : '') +
          '</div>' +
          '<div>' +
            '<div class="card"><h3>Headquarters</h3>' +
              '<p>' + (e.address || '—') + '</p>' +
              '<p style="color:var(--muted);font-size:12px;margin-top:6px;">' + (e.city || '') + ', ' + (e.state || '') + '</p>' +
              '<p style="color:var(--muted);font-size:11px;">Lat ' + (e.lat || '?').toFixed(3) + ' · Lng ' + (e.lng || '?').toFixed(3) + '</p>' +
            '</div>' +
            '<div class="card"><h3>Contact</h3><dl class="kv">' +
              '<dt>Website</dt><dd>' + web + '</dd>' +
              '<dt>Phone</dt><dd>' + phones + '</dd>' +
              '<dt>Email</dt><dd>' + emails + '</dd>' +
              '<dt>Social</dt><dd>' + socialsHtml + '</dd>' +
            '</dl></div>' +
            contactsBlock +
            neiiaBlock +
            '<div class="card"><h3>Verification</h3><p style="font-size:12px;color:var(--muted);">Last verified <strong>' + e.lastVerified + '</strong></p><p style="font-size:11px;color:var(--muted);">Re-confirm contact info with the entity before use in formal correspondence.</p></div>' +
          '</div>' +
        '</div>' +
      '</section>';
  }
</script>
</body>
</html>
