<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Directory · Energy Stakeholder Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="assets/css/stakeholder.css">
</head>
<body>

<header class="shell-header"></header>

<div class="map-layout">
  <aside class="filter-side" id="filterSide"></aside>
  <main style="flex:1;min-width:0;overflow:auto;padding:20px;">
    <div class="section-h">
      <div>
        <h2 style="margin:0;">Stakeholder directory</h2>
        <p style="margin:4px 0 0;color:var(--muted);font-size:13px;">Sortable. Searchable. Exportable.</p>
      </div>
      <button class="btn btn-secondary" id="exportBtn"></button>
    </div>
    <div class="tbl-wrap">
      <table class="tbl" id="dirTable">
        <thead>
          <tr>
            <th data-sort="name">Name <span class="sort-icon">↕</span></th>
            <th data-sort="subSector">Sub-sector <span class="sort-icon">↕</span></th>
            <th data-sort="role">Role <span class="sort-icon">↕</span></th>
            <th data-sort="state">State <span class="sort-icon">↕</span></th>
            <th>Lead</th>
            <th>Website</th>
            <th>Phone</th>
            <th>Email</th>
            <th data-sort="neiiaPriority">Priority <span class="sort-icon">↕</span></th>
          </tr>
        </thead>
        <tbody id="dirBody"></tbody>
      </table>
    </div>
  </main>
</div>

<div class="toast-wrap"></div>
<div class="panel-backdrop" id="entityBackdrop"></div>
<aside class="entity-panel" id="entityPanel"></aside>

<script src="assets/js/entities.js"></script>
<script src="assets/js/app.js"></script>
<script>
  injectHeader('directory');
  renderFilterSidebar(document.getElementById('filterSide'));

  var sortKey = 'name', sortDir = 'asc';

  function sortRows(rows) {
    return rows.slice().sort(function (a, b) {
      var av = (a[sortKey] || '').toString().toLowerCase();
      var bv = (b[sortKey] || '').toString().toLowerCase();
      if (av < bv) return sortDir === 'asc' ? -1 : 1;
      if (av > bv) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
  }

  function render() {
    var filtered = filterEntities();
    var rows = sortRows(filtered);
    var body = document.getElementById('dirBody');
    body.innerHTML = rows.map(function (e) {
      var color = NEIIA_META.subSectorColor(e.subSector);
      var lead = (e.leadership && e.leadership[0]) ? e.leadership[0].name : '—';
      var ph = (e.phones && e.phones[0]) || '—';
      var em = (e.emails && e.emails[0]) ? '<a class="ext-link" href="mailto:' + e.emails[0] + '">' + e.emails[0] + '</a>' : '—';
      var web = e.website ? '<a class="ext-link" href="' + e.website + '" target="_blank" rel="noopener" onclick="event.stopPropagation();">' + e.website.replace(/^https?:\/\//,'').replace(/\/$/,'') + '</a>' : '—';
      var dissolved = (e.status === 'dissolved' || e.status === 'merged') ? ' dissolved' : '';
      return '<tr class="' + dissolved + '" data-id="' + e.id + '">' +
        '<td data-label="Name"><span class="name-cell">' + e.name + '</span><span class="acronym">' + e.acronym + '</span></td>' +
        '<td data-label="Sub-sector"><span class="color-dot" style="background:' + color + ';"></span> ' + NEIIA_META.subSectorLabel(e.subSector) + '</td>' +
        '<td data-label="Role">' + e.role + '</td>' +
        '<td data-label="State">' + (e.state || '—') + '</td>' +
        '<td data-label="Lead">' + lead + '</td>' +
        '<td data-label="Website">' + web + '</td>' +
        '<td data-label="Phone">' + ph + '</td>' +
        '<td data-label="Email">' + em + '</td>' +
        '<td data-label="Priority"><span class="priority-chip priority-' + e.neiiaPriority + '">' + e.neiiaPriority + '</span></td>' +
      '</tr>';
    }).join('');
    updateFilterCount(filtered.length, NEIIA_ENTITIES.length);

    body.querySelectorAll('tr').forEach(function (tr) {
      tr.addEventListener('click', function () {
        var ent = NEIIA_ENTITIES.find(function (x) { return x.id === tr.dataset.id; });
        if (ent) openEntityPanel(ent);
      });
    });
  }

  document.querySelectorAll('#dirTable thead th[data-sort]').forEach(function (th) {
    th.addEventListener('click', function () {
      var k = th.dataset.sort;
      if (sortKey === k) sortDir = sortDir === 'asc' ? 'desc' : 'asc'; else { sortKey = k; sortDir = 'asc'; }
      document.querySelectorAll('#dirTable thead th').forEach(function (x) { x.classList.remove('sorted-asc', 'sorted-desc'); });
      th.classList.add('sorted-' + sortDir);
      render();
    });
  });

  document.addEventListener('filters:changed', render);

  var btn = document.getElementById('exportBtn');
  btn.innerHTML = icon('download', 14) + ' Export CSV';
  btn.addEventListener('click', function () {
    var rows = sortRows(filterEntities());
    csvExport(rows, [
      { key: 'name', label: 'Name' },
      { key: 'acronym', label: 'Acronym' },
      { label: 'Sub-sector', get: function (r) { return NEIIA_META.subSectorLabel(r.subSector); } },
      { key: 'role', label: 'Role' },
      { key: 'state', label: 'State' },
      { key: 'city', label: 'City' },
      { key: 'address', label: 'Address' },
      { label: 'Lead', get: function (r) { return (r.leadership && r.leadership[0]) ? r.leadership[0].name : ''; } },
      { key: 'website', label: 'Website' },
      { label: 'Phone', get: function (r) { return (r.phones || []).join('; '); } },
      { label: 'Email', get: function (r) { return (r.emails || []).join('; '); } },
      { key: 'neiiaRelevance', label: 'NEIIA Relevance' },
      { key: 'neiiaPriority', label: 'NEIIA Priority' },
      { key: 'status', label: 'Status' },
      { key: 'lastVerified', label: 'Last Verified' }
    ], 'nigerian-energy-stakeholders.csv');
    toast('Exported ' + rows.length + ' rows to CSV', 'success');
  });

  render();
</script>
</body>
</html>
