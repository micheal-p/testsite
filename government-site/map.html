<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map · Energy Stakeholder Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="assets/css/stakeholder.css">
</head>
<body>

<header class="shell-header"></header>

<div class="map-layout">
  <aside class="filter-side" id="filterSide"></aside>
  <div id="map"></div>
</div>

<div class="toast-wrap"></div>
<div class="panel-backdrop" id="entityBackdrop"></div>
<aside class="entity-panel" id="entityPanel"></aside>

<script src="assets/js/entities.js"></script>
<script src="assets/js/app.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
  injectHeader('map');
  renderFilterSidebar(document.getElementById('filterSide'));

  var map = L.map('map', { preferCanvas: true }).setView([9.5, 8.0], 6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 18
  }).addTo(map);

  var clusterGroup = L.markerClusterGroup({
    showCoverageOnHover: false,
    maxClusterRadius: 50,
    iconCreateFunction: function (cluster) {
      var n = cluster.getChildCount();
      return L.divIcon({
        html: '<div style="background:#0E7A3C;color:#fff;border-radius:999px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;border:3px solid #fff;box-shadow:0 2px 8px rgba(14,122,60,0.3);">' + n + '</div>',
        className: '',
        iconSize: L.point(36, 36)
      });
    }
  });
  map.addLayer(clusterGroup);

  function draw() {
    clusterGroup.clearLayers();
    var rows = filterEntities();
    rows.forEach(function (e) {
      if (!e.lat || !e.lng) return;
      var color = NEIIA_META.subSectorColor(e.subSector);
      var m = L.circleMarker([e.lat, e.lng], {
        radius: 9,
        fillColor: color,
        color: '#fff',
        weight: 2,
        opacity: 1,
        fillOpacity: 0.92
      });
      m.bindTooltip('<strong>' + e.acronym + '</strong> · ' + e.name, { sticky: false, direction: 'top', offset: [0, -6] });
      m.on('click', function () { openEntityPanel(e); });
      clusterGroup.addLayer(m);
    });
    updateFilterCount(rows.length, NEIIA_ENTITIES.length);
  }

  document.addEventListener('filters:changed', draw);
  draw();
</script>
</body>
</html>
