<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | eVillage Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css?v=2.0">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: -0.01em;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0d3d44 0%, #0a2e33 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .chooser-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 560px;
            width: 100%;
            padding: 56px;
            position: relative;
        }

        .logo-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            text-decoration: none;
            color: #0d3d44;
            font-weight: 600;
            font-size: 18px;
        }

        .logo-link i { font-size: 24px; }

        .chooser-header { margin-bottom: 32px; }
        .chooser-header h1 {
            font-size: 28px;
            font-weight: 600;
            margin: 0 0 8px 0;
            color: #111827;
        }
        .chooser-header p {
            font-size: 15px;
            color: #6b7280;
            margin: 0;
        }

        .portal-list {
            display: grid;
            gap: 12px;
            margin-bottom: 28px;
        }

        .portal-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            text-decoration: none;
            background: #fff;
            transition: border-color .15s ease, box-shadow .15s ease, transform .12s ease, background .15s ease;
        }
        .portal-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
        }

        .portal-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #fff;
            flex-shrink: 0;
        }
        .portal-icon.citizen { background: linear-gradient(135deg, #0d3d44, #0a2e33); }
        .portal-icon.vendor  { background: linear-gradient(135deg, #4c1d95, #3c147a); }
        .portal-icon.admin   { background: linear-gradient(135deg, #7f1d1d, #5c1010); }

        .portal-info { flex: 1; min-width: 0; }
        .portal-name {
            font-size: 16px;
            font-weight: 600;
            color: #111827;
            margin: 0 0 2px 0;
        }
        .portal-desc {
            font-size: 13.5px;
            color: #6b7280;
            margin: 0;
            line-height: 1.4;
        }

        .portal-card .portal-arrow {
            color: #9ca3af;
            font-size: 14px;
            transition: transform .15s ease, color .15s ease;
        }
        .portal-card:hover .portal-arrow { transform: translateX(3px); }
        .portal-card.citizen:hover { border-color: #0d3d44; }
        .portal-card.citizen:hover .portal-arrow { color: #0d3d44; }
        .portal-card.vendor:hover { border-color: #4c1d95; }
        .portal-card.vendor:hover .portal-arrow { color: #4c1d95; }
        .portal-card.admin:hover { border-color: #7f1d1d; }
        .portal-card.admin:hover .portal-arrow { color: #7f1d1d; }

        .chooser-footer {
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
            font-size: 14px;
            color: #6b7280;
            text-align: center;
        }
        .chooser-footer a {
            color: #0d3d44;
            text-decoration: none;
            font-weight: 600;
        }
        .chooser-footer a:hover { text-decoration: underline; }

        @media (max-width: 640px) {
            .chooser-card { padding: 40px 24px; }
            .chooser-header h1 { font-size: 24px; }
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="../assets/images/Coat_of_arms_of_Nigeria.svg">
</head>

<body>
    <div class="chooser-card">
        <a href="evillage.html" aria-label="Cancel and return home" title="Cancel"
            style="position: absolute; top: 14px; right: 14px; width: 36px; height: 36px; display: inline-flex; align-items: center; justify-content: center; border-radius: 9999px; background: rgba(15, 23, 42, 0.05); color: #475569; text-decoration: none; transition: all 0.2s; z-index: 10;"
            onmouseover="this.style.background='rgba(15,23,42,0.12)';this.style.color='#0f172a';"
            onmouseout="this.style.background='rgba(15,23,42,0.05)';this.style.color='#475569';">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </a>
        <a href="evillage.html" class="logo-link">
            <i class="fas fa-leaf"></i>
            <span>eVillage Portal</span>
        </a>

        <div class="chooser-header">
            <h1>Sign in to your portal</h1>
            <p>Choose the account type you want to sign in with.</p>
        </div>

        <div class="portal-list">
            <a href="evillage-signin-citizen.html" class="portal-card citizen">
                <div class="portal-icon citizen"><i class="fas fa-user"></i></div>
                <div class="portal-info">
                    <div class="portal-name">Citizen</div>
                    <div class="portal-desc">Apply for solar financing, track subsidies, and manage your home energy.</div>
                </div>
                <i class="fas fa-arrow-right portal-arrow"></i>
            </a>

            <a href="evillage-signin-vendor.html" class="portal-card vendor">
                <div class="portal-icon vendor"><i class="fas fa-store"></i></div>
                <div class="portal-info">
                    <div class="portal-name">Vendor</div>
                    <div class="portal-desc">Manage installations, products, bids, and service contracts.</div>
                </div>
                <i class="fas fa-arrow-right portal-arrow"></i>
            </a>
        </div>

        <div class="chooser-footer">
            Don't have an account? <a href="evillage-signup.html">Sign up</a>
        </div>
    </div>
</body>

</html>
