<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Sign In | eVillage Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css?v=2.0">
    <style>
        :root {
            --portal-primary: #0d3d44;
            --portal-primary-dark: #0a2e33;
            --portal-accent: #0d3d44;
            --portal-accent-soft: rgba(13, 61, 68, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: -0.01em;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, var(--portal-primary) 0%, var(--portal-primary-dark) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .signin-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 480px;
            width: 100%;
            padding: 60px;
            position: relative;
        }

        .portal-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            background: var(--portal-accent-soft);
            color: var(--portal-accent);
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .logo-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
            text-decoration: none;
            color: var(--portal-primary);
            font-weight: 600;
            font-size: 18px;
        }

        .logo-link i { font-size: 24px; }

        .signin-header { margin-bottom: 32px; }
        .signin-header h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #111827;
        }
        .signin-header p { font-size: 16px; color: #6b7280; margin: 0; }
        .signin-header p a { color: var(--portal-primary); text-decoration: none; font-weight: 600; }
        .signin-header p a:hover { text-decoration: underline; }

        .form-error {
            display: none;
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .form-error.visible { display: block; }

        .form-group { margin-bottom: 24px; }
        .form-group label {
            display: block;
            font-size: 16px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--portal-primary);
            box-shadow: 0 0 0 3px var(--portal-accent-soft);
        }

        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 48px; }
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #6b7280;
            font-size: 16px;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toggle-password:hover { color: #111827; }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            color: #6b7280;
        }
        .remember-me input { width: auto; }
        .forgot-link {
            font-size: 15px;
            color: var(--portal-primary);
            text-decoration: none;
            font-weight: 600;
        }
        .forgot-link:hover { text-decoration: underline; }

        .submit-btn {
            width: 100%;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: var(--portal-primary);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .submit-btn:hover { background: var(--portal-primary-dark); }
        .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; }

        .portal-switch {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
            font-size: 13px;
            color: #6b7280;
            text-align: center;
        }
        .portal-switch a {
            color: var(--portal-primary);
            text-decoration: none;
            font-weight: 600;
        }
        .portal-switch a:hover { text-decoration: underline; }
        .portal-switch .divider-dot { margin: 0 8px; color: #d1d5db; }

        @media (max-width: 640px) {
            .signin-card { padding: 40px 24px; }
            .signin-header h1 { font-size: 28px; }
            .form-footer { flex-direction: column; align-items: flex-start; gap: 12px; }
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="../assets/images/Coat_of_arms_of_Nigeria.svg">
</head>

<body>
    <div class="signin-card">
        <a href="evillage.html" aria-label="Cancel and return home" title="Cancel"
            style="position: absolute; top: 14px; right: 14px; width: 36px; height: 36px; display: inline-flex; align-items: center; justify-content: center; border-radius: 9999px; background: rgba(15, 23, 42, 0.05); color: #475569; text-decoration: none; transition: all 0.2s; z-index: 10;"
            onmouseover="this.style.background='rgba(15,23,42,0.12)';this.style.color='#0f172a';"
            onmouseout="this.style.background='rgba(15,23,42,0.05)';this.style.color='#475569';">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </a>
        <a href="evillage.html" class="logo-link">
            <i class="fas fa-leaf"></i>
            <span>eVillage Portal</span>
        </a>

        <span class="portal-badge"><i class="fas fa-user"></i> Citizen Portal</span>

        <div class="signin-header">
            <h1>Welcome back</h1>
            <p>Don't have an account? <a href="evillage-signup.html">Create one</a></p>
        </div>

        <div id="signinNotice" role="status" aria-live="polite" style="display:none;background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46;padding:12px 16px;border-radius:6px;font-size:14px;margin-bottom:16px;"></div>
        <div id="signinError" class="form-error" role="alert" aria-live="polite"></div>

        <form id="signinForm" novalidate>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <button type="button" class="toggle-password" id="togglePassword" aria-label="Show password">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-footer">
                <label class="remember-me">
                    <input type="checkbox" name="remember">
                    <span>Remember me</span>
                </label>
                <a href="evillage-forgot-password.html" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Sign In as Citizen</button>
        </form>

        <div class="portal-switch">
            Not a citizen? <a href="evillage-signin-vendor.html">Vendor sign in</a>
        </div>
    </div>

    <script src="config.js?v=1.0"></script>
    <script src="evillage-api.js?v=1.0"></script>
    <script>
        (function () {
            const EXPECTED_ROLE = 'citizen';
            const PORTAL_LABEL = 'Citizen';
            const DESTINATION = 'evillage-dashboard.html';

            const toggleBtn = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            toggleBtn.addEventListener('click', function () {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                this.querySelector('i').className = isPassword ? 'far fa-eye-slash' : 'far fa-eye';
                this.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
            });

            const form = document.getElementById('signinForm');
            const submitBtn = document.getElementById('submitBtn');
            const errorBox = document.getElementById('signinError');
            const emailInput = document.getElementById('email');
            const rememberInput = form.querySelector('input[name="remember"]');

            function showError(msg) {
                errorBox.textContent = msg;
                errorBox.classList.add('visible');
            }
            function clearError() {
                errorBox.textContent = '';
                errorBox.classList.remove('visible');
            }


            form.addEventListener('submit', async function (e) {
                e.preventDefault();
                clearError();

                const email = (emailInput.value || '').trim();
                const password = passwordInput.value || '';
                const persistent = !!(rememberInput && rememberInput.checked);

                if (!email || !password) {
                    showError('Please enter your email and password.');
                    return;
                }

                submitBtn.disabled = true;
                const originalText = submitBtn.textContent;
                submitBtn.textContent = 'Signing in...';

                try {
                    const result = await window.EvillageAPI.login(email, password, persistent);

                    // Role-specific check — keeps credentials scoped to this portal.
                    // Don't leak whether the account exists under a different role; surface a generic error.
                    if (!result || (result.role || '').toLowerCase() !== EXPECTED_ROLE) {
                        window.EvillageAPI.clearAuth();
                        showError('Invalid email or password.');
                        return;
                    }

                    if (result.status && result.status !== 'active') {
                        showError('Your account is ' + result.status + '. Please contact support.');
                        window.EvillageAPI.clearAuth();
                        return;
                    }

                    try { await window.EvillageAPI.getMe(); }
                    catch (meErr) { console.error('Failed to fetch /api/v1/me:', meErr); }

                    window.location.href = DESTINATION;
                } catch (err) {
                    let msg;
                    if (err && err.status === 500) {
                        msg = 'Your account could not be signed in. If your account is still pending approval, please wait for confirmation.';
                    } else if (err && err.message) {
                        msg = err.message;
                    } else {
                        msg = 'Sign-in failed. Please try again.';
                    }
                    showError(msg);
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                }
            });
        })();
    </script>
</body>

</html>
