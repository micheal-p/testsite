<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Submitted | eVillage Vendor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="fonts/norgroup-pack/norgroup-pack.css">
    <link rel="stylesheet" href="../styles.css?v=2.0">
    <script src="config.js?v=1.0"></script>
    <script src="evillage-api.js?v=1.0"></script>
    <script src="evillage-vendor-finance.js?v=1.0"></script>
    <link rel="icon" type="image/svg+xml" href="../assets/images/Coat_of_arms_of_Nigeria.svg" sizes="50x50">
    <style>
        :root { --brand: #4c1d95; --brand-accent: #a855f7; --bg: #f3f4f6; --ink: #111827; --muted: #6b7280; --border: #e5e7eb; --opay: #0f766e; --boi: #15803d; }
        * { box-sizing: border-box; }
        body { font-family: 'Norgroup', -apple-system, sans-serif; background: linear-gradient(135deg, #f5f3ff 0%, #ecfdf5 100%); margin: 0; min-height: 100vh; padding: 32px 20px; color: var(--ink); -webkit-font-smoothing: antialiased; }
        .wrap { max-width: 920px; margin: 0 auto; }
        .card { background: white; border-radius: 22px; box-shadow: 0 24px 60px -12px rgba(76,29,149,0.18); overflow: hidden; }
        .top-bar { height: 6px; background: linear-gradient(90deg, var(--brand), var(--brand-accent), var(--opay), var(--boi)); }

        .hero { padding: 44px 40px 32px; text-align: center; position: relative; overflow: hidden; }
        .hero::before { content: ''; position: absolute; right: -80px; top: -60px; width: 280px; height: 280px; background: radial-gradient(rgba(168,85,247,0.10), transparent 70%); border-radius: 50%; }
        .check-wrap { width: 96px; height: 96px; background: linear-gradient(135deg, var(--brand), var(--brand-accent)); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 42px; margin: 0 auto 22px; box-shadow: 0 14px 32px rgba(76,29,149,0.35); animation: pop 0.5s cubic-bezier(0.16, 1, 0.3, 1); position: relative; z-index: 2; }
        @keyframes pop { 0% { transform: scale(0); } 70% { transform: scale(1.08); } 100% { transform: scale(1); } }
        .hero h1 { font-size: 28px; font-weight: 600; margin: 0 0 8px; }
        .hero p.lead { font-size: 15.5px; color: var(--muted); margin: 0 auto 6px; max-width: 540px; line-height: 1.55; }
        .ref-pill { display: inline-flex; align-items: center; gap: 8px; margin-top: 14px; padding: 7px 14px; background: var(--bg); border-radius: 20px; font-size: 13px; font-family: monospace; color: var(--ink); }

        .summary { padding: 0 40px; }
        .summary-grid { background: var(--bg); border-radius: 14px; padding: 22px 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 18px; margin-bottom: 28px; }
        .summary-grid div { display: flex; flex-direction: column; gap: 4px; }
        .summary-grid label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
        .summary-grid span { font-size: 14px; font-weight: 500; }

        .routing { padding: 0 40px 32px; }
        .routing h3 { font-size: 16px; margin: 0 0 16px; display: flex; align-items: center; gap: 10px; }
        .routing h3 i { color: var(--brand); }
        .routing-rail { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; position: relative; padding: 6px 0; }
        .routing-rail::before { content: ''; position: absolute; top: 30px; left: 14%; right: 14%; height: 2px; background: linear-gradient(90deg, var(--brand), var(--opay), var(--boi)); z-index: 0; }
        .rstep { text-align: center; padding: 0 8px; position: relative; z-index: 1; }
        .rstep .ic { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; margin: 0 auto 10px; color: white; box-shadow: 0 8px 20px rgba(0,0,0,0.10); }
        .rstep .ic.brand { background: var(--brand); }
        .rstep .ic.evillage { background: linear-gradient(135deg, #10b981, #059669); }
        .rstep .ic.opay { background: linear-gradient(135deg, var(--opay), #0d9488); }
        .rstep .ic.boi { background: linear-gradient(135deg, var(--boi), #16a34a); }
        .rstep h4 { margin: 0 0 4px; font-size: 14px; font-weight: 600; }
        .rstep p { margin: 0; font-size: 12px; color: var(--muted); line-height: 1.45; }

        .timeline { padding: 0 40px 36px; }
        .timeline h3 { font-size: 16px; margin: 0 0 18px; display: flex; align-items: center; gap: 10px; }
        .timeline h3 i { color: var(--brand); }
        .tline { border-left: 2px solid var(--border); margin-left: 12px; padding-left: 24px; }
        .tline .item { position: relative; padding-bottom: 18px; }
        .tline .item::before { content: ''; position: absolute; left: -33px; top: 4px; width: 12px; height: 12px; border-radius: 50%; background: white; border: 3px solid var(--border); }
        .tline .item.done::before { background: #16a34a; border-color: #16a34a; }
        .tline .item.active::before { background: var(--brand); border-color: var(--brand); box-shadow: 0 0 0 4px rgba(76,29,149,0.18); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 4px rgba(76,29,149,0.20); } 50% { box-shadow: 0 0 0 8px rgba(76,29,149,0.06); } 100% { box-shadow: 0 0 0 4px rgba(76,29,149,0.20); } }
        .tline h5 { margin: 0 0 4px; font-size: 14px; font-weight: 600; }
        .tline p { margin: 0; font-size: 13px; color: var(--muted); line-height: 1.5; }
        .tline .when { font-size: 11.5px; color: var(--muted); margin-top: 2px; font-family: monospace; }

        .next-steps { background: #fefce8; border-left: 4px solid #fbbf24; border-radius: 12px; padding: 18px 22px; margin: 0 40px 28px; }
        .next-steps h3 { font-size: 14px; margin: 0 0 10px; color: #92400e; }
        .next-steps ul { margin: 0; padding-left: 20px; color: #78350f; font-size: 13px; line-height: 1.7; }
        .next-steps strong { color: #422006; }

        .actions { padding: 22px 40px 32px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .btn { padding: 12px 22px; border-radius: 10px; font-weight: 500; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; border: none; }
        .btn-primary { background: var(--brand); color: white; }
        .btn-primary:hover { background: #3c1683; }
        .btn-secondary { background: white; color: var(--ink); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--brand); color: var(--brand); }

        .err-box { max-width: 540px; margin: 80px auto; background: white; border-radius: 16px; padding: 36px; text-align: center; box-shadow: 0 12px 32px rgba(0,0,0,0.06); }

        @media (max-width: 720px) {
            .hero, .summary, .routing, .timeline, .actions, .next-steps { padding-left: 22px !important; padding-right: 22px !important; }
            .routing-rail { grid-template-columns: 1fr 1fr; gap: 18px 0; }
            .routing-rail::before { display: none; }
            .summary-grid { padding: 18px; }
        }
    </style>
</head>
<body>
    <div class="wrap" id="root">
        <div class="card">
            <div class="top-bar"></div>
            <div class="err-box">
                <div style="color:#9ca3af;font-size:32px;margin-bottom:14px;"><i class="fas fa-spinner fa-spin"></i></div>
                <p style="color: var(--muted); margin: 0;">Loading…</p>
            </div>
        </div>
    </div>

    <script>
        const F = window.eVillageFinance;
        const appId = sessionStorage.getItem('justSubmittedFinanceApp');
        const root = document.getElementById('root');

        if (!appId) {
            root.innerHTML = `
                <div class="card">
                    <div class="top-bar"></div>
                    <div class="err-box">
                        <i class="fas fa-circle-info" style="font-size: 36px; color: #f59e0b; margin-bottom: 16px;"></i>
                        <h2 style="margin: 0 0 8px;">No application in this session</h2>
                        <p style="color: var(--muted); margin: 0 0 22px;">It looks like you arrived here without submitting an application. Head to the Loans &amp; Grants page to start one.</p>
                        <a class="btn btn-primary" href="evillage-vendor-loans.html"><i class="fas fa-arrow-right"></i> Go to Loans &amp; Grants</a>
                    </div>
                </div>`;
        } else {
            const app = F.getApplication(appId);
            const product = F.getProduct(app.productId);
            const isLoan = app.type === 'loan';

            root.innerHTML = `
                <div class="card">
                    <div class="top-bar"></div>
                    <div class="hero">
                        <div class="check-wrap"><i class="fas fa-check"></i></div>
                        <h1>Application Submitted!</h1>
                        <p class="lead">Your ${isLoan ? 'productivity loan' : 'grant'} application has been received and is now in the review pipeline.</p>
                        <div class="ref-pill"><i class="fas fa-hashtag"></i> ${app.id}</div>
                    </div>

                    <div class="summary">
                        <div class="summary-grid">
                            <div><label>Product</label><span>${product.name}</span></div>
                            <div><label>Provider</label><span>${product.provider}</span></div>
                            <div><label>Type</label><span>${isLoan ? 'Productivity Loan' : 'Grant'}</span></div>
                            <div><label>Amount requested</label><span>${F.fmtNaira(app.requested.amount)}</span></div>
                            ${isLoan ? `<div><label>Tenor</label><span>${app.requested.tenorMonths} months</span></div>` : ''}
                            <div><label>Submitted</label><span>${F.fmtDate(app.submittedAt)}</span></div>
                            <div style="grid-column:1/-1;"><label>Vendor</label><span>${app.vendorName}</span></div>
                        </div>
                    </div>

                    <div class="routing">
                        <h3><i class="fas fa-route"></i> How your application gets to BOI</h3>
                        <div class="routing-rail">
                            <div class="rstep">
                                <div class="ic brand"><i class="fas fa-store"></i></div>
                                <h4>You</h4>
                                <p>Vendor submits via eVillage portal.</p>
                            </div>
                            <div class="rstep">
                                <div class="ic evillage"><i class="fas fa-leaf"></i></div>
                                <h4>eVillage</h4>
                                <p>Validates CAC, BVN, sales history &amp; KYC.</p>
                            </div>
                            <div class="rstep">
                                <div class="ic opay"><i class="fas fa-circle-nodes"></i></div>
                                <h4>OPay</h4>
                                <p>Asset manager packages applicant for BOI.</p>
                            </div>
                            <div class="rstep">
                                <div class="ic boi"><i class="fas fa-landmark"></i></div>
                                <h4>BOI</h4>
                                <p>Bank of Industry credit committee decides.</p>
                            </div>
                        </div>
                    </div>

                    <div class="timeline">
                        <h3><i class="fas fa-list-check"></i> Expected timeline</h3>
                        <div class="tline">
                            <div class="item done">
                                <h5>Submitted</h5>
                                <p>You completed the application and consented to data sharing with OPay and BOI.</p>
                                <div class="when">${F.fmtDate(app.submittedAt)}</div>
                            </div>
                            <div class="item active">
                                <h5>eVillage Validation &mdash; in progress</h5>
                                <p>Automated CAC verification, BVN match, sales-history checks. Typically completes within 48 hours.</p>
                                <div class="when">Now → 48 hrs</div>
                            </div>
                            <div class="item">
                                <h5>OPay Review</h5>
                                <p>OPay verifies wallet history, transaction volume and prepares applicant package for BOI's credit committee.</p>
                                <div class="when">Within 5–7 business days</div>
                            </div>
                            <div class="item">
                                <h5>BOI Credit Decision</h5>
                                <p>Bank of Industry credit committee reviews and issues a decision. ${isLoan ? 'On approval: signed offer letter & disbursement via OPay vendor wallet.' : 'On approval: grant disbursement via OPay vendor wallet, milestone reporting begins.'}</p>
                                <div class="when">Up to 30 business days</div>
                            </div>
                        </div>
                    </div>

                    <div class="next-steps">
                        <h3><i class="fas fa-bell"></i> What you need to do</h3>
                        <ul>
                            <li><strong>Check your registered email</strong> (${app.vendorEmail}) for the submission receipt and any document follow-ups.</li>
                            <li><strong>Track status</strong> on your <strong>Loans &amp; Grants</strong> tab. The pipeline updates as your application moves through eVillage → OPay → BOI.</li>
                            <li><strong>Respond fast</strong> if OPay or BOI request additional documents. Delays in document responses are the most common reason for slow decisions.</li>
                            <li>Keep your vendor profile data (sales, products) up to date — strong, consistent numbers improve your underwriting score.</li>
                        </ul>
                    </div>

                    <div class="actions">
                        <a class="btn btn-secondary" href="evillage-vendor-dashboard.html"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
                        <a class="btn btn-primary" href="evillage-vendor-loans.html"><i class="fas fa-eye"></i> View My Applications</a>
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
