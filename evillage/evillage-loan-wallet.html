<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Wallet | eVillage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css?v=2.0">
    <script src="config.js?v=1.0"></script>
    <script src="evillage-api.js?v=1.0"></script>
    <script>window.EVILLAGE_REQUIRED_ROLES = ['citizen'];</script>
    <script src="evillage-guard.js?v=1.0"></script>
    <script src="evillage-loans.js?v=1.0"></script>
    <link rel="icon" type="image/svg+xml" href="../assets/images/Coat_of_arms_of_Nigeria.svg" sizes="50x50">
    <style>
        :root {
            --portal-primary: #0d3d44;
            --portal-primary-dark: #0a2e33;
            --portal-accent: #10b981;
            --opay-blue: #1B5DDB;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased; margin: 0;
            background: #f3f4f6; color: #111827;
        }

        .wallet-hero {
            background: linear-gradient(135deg, var(--portal-primary) 0%, var(--portal-primary-dark) 100%);
            color: #fff;
            padding: 36px 24px 48px;
        }
        .wallet-back {
            display: inline-flex; align-items: center; gap: 8px;
            color: rgba(255,255,255,.75); text-decoration: none;
            font-size: 13px; margin-bottom: 18px;
        }
        .wallet-back:hover { color: #fff; }
        .wallet-hero-inner { max-width: 900px; margin: 0 auto; }
        .wallet-hero h1 { margin: 0 0 4px; font-size: 22px; font-weight: 700; }
        .wallet-hero p  { margin: 0; color: rgba(255,255,255,.7); font-size: 13.5px; }

        .va-card {
            margin-top: 18px;
            background: #fff;
            border-radius: 18px;
            padding: 20px 22px;
            color: #0f172a;
            display: flex; flex-direction: column; gap: 18px;
            box-shadow: 0 24px 60px -28px rgba(15,23,42,.55);
        }
        .va-head {
            display: flex; flex-direction: row;
            align-items: center; justify-content: space-between;
            gap: 12px; flex-wrap: wrap;
            padding: 0; min-height: 0;
        }
        .va-brand { display: inline-flex; align-items: center; gap: 10px; min-width: 0; }
        .va-brand .va-logo { height: 24px; width: auto; flex-shrink: 0; display: block; }
        .va-brand .va-x {
            font-size: 12px; font-weight: 700; letter-spacing: .02em; color: #6b7280;
        }
        .va-tag {
            font-size: 10.5px; font-weight: 700; padding: 4px 10px; border-radius: 999px;
            background: #ecfdf5; color: #047857; letter-spacing: .06em; text-transform: uppercase;
            flex-shrink: 0;
        }

        .va-number-block { min-width: 0; }
        .va-label {
            font-size: 10px; font-weight: 700; color: #6b7280;
            text-transform: uppercase; letter-spacing: .14em;
            margin-bottom: 6px;
        }
        .va-number-row {
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px;
        }
        .digits {
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            font-size: clamp(22px, 6.4vw, 30px);
            font-weight: 700; letter-spacing: .04em;
            color: #0f172a; line-height: 1.1;
            min-width: 0; overflow-wrap: anywhere;
        }
        .va-copy {
            display: inline-flex; align-items: center; justify-content: center;
            width: 38px; height: 38px;
            border: 1px solid #e5e7eb; background: #f8fafc;
            border-radius: 999px;
            color: #374151; cursor: pointer; flex-shrink: 0;
            transition: background .15s ease, border-color .15s ease, color .15s ease;
        }
        .va-copy:hover { background: var(--portal-primary); border-color: var(--portal-primary); color: #fff; }

        .va-foot {
            display: flex; flex-direction: row;
            align-items: flex-end; justify-content: space-between;
            gap: 16px; flex-wrap: wrap;
            padding: 16px 0 0;
            border-top: 1px solid #f1f5f9;
            min-height: 0;
        }
        .va-foot-right { text-align: right; }
        .va-name {
            font-size: 15px; font-weight: 700; color: #0f172a;
            letter-spacing: .02em; line-height: 1.2;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            max-width: 22ch;
        }
        .va-expiry {
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            font-size: 15px; font-weight: 700; color: #0f172a;
            letter-spacing: .04em;
        }

        /* Wallet card mobile polish */
        @media (max-width: 560px) {
            .wallet-hero { padding: 24px 18px 34px; }
            .wallet-hero h1 { font-size: 19px; }
            .wallet-hero p  { font-size: 12.5px; }
            .va-card { padding: 16px 16px; border-radius: 14px; gap: 14px; }
            .va-foot { padding-top: 14px; gap: 14px; }
            .va-name { max-width: 16ch; }
            .va-copy { width: 36px; height: 36px; font-size: 13px; }
        }

        .wallet-shell { max-width: 900px; margin: -24px auto 56px; padding: 0 20px 40px; }
        .panel {
            background: #fff; border-radius: 16px; padding: 22px 22px 20px;
            box-shadow: 0 12px 32px -22px rgba(15,23,42,.35);
            margin-top: 18px;
        }
        .panel h2 {
            margin: 0 0 4px; font-size: 16px; font-weight: 700; color: #0f172a;
        }
        .panel .sub { margin: 0 0 14px; font-size: 12.5px; color: #6b7280; }

        .summary-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
        }
        @media (min-width: 720px) { .summary-grid { grid-template-columns: repeat(4, 1fr); } }
        .summary-item {
            background: #f8fafc; border-radius: 12px; padding: 13px 14px;
            border: 1px solid #e2e8f0;
        }
        .summary-label {
            font-size: 11px; color: #6b7280; font-weight: 600;
            text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px;
        }
        .summary-value { font-size: 16px; font-weight: 700; color: #0f172a; }
        .summary-value.green { color: #047857; }
        .summary-value.amber { color: #b45309; }

        .schedule {
            display: grid; grid-template-columns: 1fr; gap: 8px;
        }
        @media (min-width: 720px) { .schedule { grid-template-columns: 1fr 1fr; } }
        .row {
            display: grid; grid-template-columns: 36px 1fr auto;
            align-items: center; gap: 12px;
            border: 1px solid #e5e7eb; border-radius: 12px;
            padding: 11px 13px; background: #fff;
        }
        .row.paid     { border-color: #bbf7d0; background: #f0fdf4; }
        .row.due      { border-color: #fde68a; background: #fffbeb; }
        .row.upcoming { background: #fff; }
        .row .marker {
            width: 30px; height: 30px; border-radius: 999px;
            display: grid; place-items: center; font-size: 12px; font-weight: 700;
            background: #f1f5f9; color: #475569;
        }
        .row.paid     .marker { background: #10b981; color: #fff; }
        .row.due      .marker { background: #f59e0b; color: #fff; }
        .row .label   { font-size: 13.5px; font-weight: 600; color: #0f172a; }
        .row .meta    { font-size: 11.5px; color: #6b7280; margin-top: 2px; }
        .row .amount  {
            font-family: ui-monospace, monospace;
            font-size: 13.5px; font-weight: 700; color: #111827;
            text-align: right;
        }

        .empty {
            background: #fff; border: 1px solid #e2e8f0; border-radius: 16px;
            padding: 40px 28px; text-align: center;
            box-shadow: 0 8px 24px -18px rgba(15,23,42,.2);
        }
        .empty-icon {
            width: 52px; height: 52px; margin: 0 auto 14px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--portal-primary), var(--portal-primary-dark));
            color: #A8E063; display: grid; place-items: center; font-size: 22px;
        }
        .empty-title { margin: 0; font-size: 16px; font-weight: 700; color: #0f172a; }
        .empty-sub   { margin: 6px 0 18px; font-size: 13px; color: #6b7280; line-height: 1.55; max-width: 30ch; margin-left: auto; margin-right: auto; }
        .empty a {
            display: inline-block;
            padding: 11px 20px; border-radius: 999px;
            background: var(--portal-primary); color: #fff;
            text-decoration: none; font-weight: 700; font-size: 13px;
            transition: background .15s ease;
        }
        .empty a:hover { background: var(--portal-primary-dark); }
    </style>
</head>
<body>

    <section class="wallet-hero">
        <div class="wallet-hero-inner">
            <a href="evillage-dashboard.html" class="wallet-back"><i class="fas fa-arrow-left"></i> Dashboard</a>
            <h1>Loan Wallet</h1>
            <p>Pay your monthly instalment by bank transfer to your OPay collection account.</p>

            <div class="va-card" id="vaCard">
                <header class="va-head">
                    <div class="va-brand">
                        <img src="../assets/images/logos/opay.svg" alt="OPay" class="va-logo">
                        <span class="va-x">× eVillage</span>
                    </div>
                    <span class="va-tag" id="vaStatus">Active</span>
                </header>

                <div class="va-number-block">
                    <div class="va-label">Account number</div>
                    <div class="va-number-row">
                        <div class="digits" id="vaDigits">— — — — — — — — — —</div>
                        <button type="button" class="va-copy" id="vaCopyBtn" aria-label="Copy account number">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                </div>

                <footer class="va-foot">
                    <div>
                        <div class="va-label">Account name</div>
                        <div class="va-name" id="vaName">—</div>
                    </div>
                    <div class="va-foot-right">
                        <div class="va-label">Valid thru</div>
                        <div class="va-expiry" id="vaExpiry">—</div>
                    </div>
                </footer>
            </div>
        </div>
    </section>

    <main class="wallet-shell" id="walletShell">
        <!-- Filled by JS once a loan is loaded. -->
    </main>

    <script>
        /**
         * eVillage loan wallet — UI prototype.
         *
         * This UI assumes a *permanent* OPay collection account per citizen
         * ("OPay Recollection / Static Virtual Account"). That product is
         * enterprise-only and not in OPay's public Checkout docs, so the
         * account number below is generated client-side for now. When the
         * enterprise API is provisioned, replace `permanentCollectionAccount`
         * with a real fetch — the response shape we expect is:
         *
         *   { accountNumber, accountName, bankName, status, customerReference }
         *
         * Webhook on successful credit (matches OPay's callback format):
         *   { type: "transaction-status", sha512,
         *     payload: { reference, status: "SUCCESS", amount, currency,
         *                transactionId, timestamp, ... } }
         * Match `payload.reference` to "EV-<loanId>-M<monthNum>" and flip the
         * matching schedule row to paid.
         */
        (function () {
            const $ = (s, r = document) => r.querySelector(s);
            const fmtNaira = (n) => '₦' + (Number(n) || 0).toLocaleString();

            const user = window.EVILLAGE_USER || null;
            if (!user) return; // guard.js will already have redirected.

            // Resolve a displayable full name from the canonical user shape
            // produced by /api/v1/me (matches guard.js's deriveFullName).
            function fullNameOf(u) {
                if (!u) return '';
                if (u.full_name) return u.full_name;
                const p = u.profile || {};
                if (p.first_name || p.last_name) return ((p.first_name || '') + ' ' + (p.last_name || '')).trim();
                if (p.business_name) return p.business_name;
                return u.email || '';
            }

            // Stable "issued at" timestamp so the expiry doesn't drift visit-to-visit.
            function issuedAt(u) {
                if (u.created_at) {
                    const t = Date.parse(u.created_at);
                    if (!isNaN(t)) return new Date(t);
                }
                const key = 'evillage_recoll_issued_at:' + (u.id || u.email || 'me');
                const stored = localStorage.getItem(key);
                if (stored) return new Date(parseInt(stored, 10));
                const now = Date.now();
                localStorage.setItem(key, String(now));
                return new Date(now);
            }

            /**
             * Deterministic 10-digit OPay-style NUBAN + 3-year expiry per user.
             * Returns the shape we expect from the real OPay enterprise
             * Recollection endpoint, so backend wiring is field-for-field.
             */
            function permanentCollectionAccount(u) {
                const seedSrc = String(u.id || u.email || 'evillage');
                let seed = 0;
                for (let i = 0; i < seedSrc.length; i++) seed = (seed * 31 + seedSrc.charCodeAt(i)) >>> 0;
                const tail = String(seed % 1000000).padStart(6, '0');
                const issued = issuedAt(u);
                const expires = new Date(issued); expires.setFullYear(expires.getFullYear() + 3);
                return {
                    accountNumber: '8088' + tail,
                    accountName:   (fullNameOf(u) || 'eVillage citizen').toUpperCase(),
                    bankName:      'OPay',
                    status:        'ACTIVE',
                    issuedAt:      issued.toISOString(),
                    expiresAt:     expires.toISOString()
                };
            }

            const acct = permanentCollectionAccount(user);
            $('#vaDigits').textContent = acct.accountNumber.replace(/(\d{4})(\d{3})(\d{3})/, '$1 $2 $3');
            $('#vaName').textContent   = acct.accountName;
            $('#vaStatus').textContent = acct.status === 'ACTIVE' ? 'Active' : acct.status;
            const exp = new Date(acct.expiresAt);
            $('#vaExpiry').textContent = String(exp.getMonth() + 1).padStart(2, '0') + '/' + String(exp.getFullYear()).slice(-2);

            $('#vaCopyBtn').addEventListener('click', async () => {
                try {
                    await navigator.clipboard.writeText(acct.accountNumber);
                    const btn = $('#vaCopyBtn');
                    const original = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-check"></i> Copied';
                    setTimeout(() => (btn.innerHTML = original), 1200);
                } catch (_) {}
            });

            // ── Active loan ─────────────────────────────────────────────
            const apps = (window.EvillageLoans.listApplicationsForCitizen
                ? window.EvillageLoans.listApplicationsForCitizen(user)
                : []) || [];
            const active = apps.find((a) =>
                ['approved', 'disbursed', 'repaying', 'pending_disbursement', 'in_review'].includes(a.status)
            ) || apps[0] || null;

            const shell = $('#walletShell');

            if (!active) {
                shell.innerHTML = `
                    <div class="empty">
                        <div class="empty-icon"><i class="fas fa-solar-panel"></i></div>
                        <p class="empty-title">No active loan yet</p>
                        <p class="empty-sub">Apply for clean-energy financing — Pay Small Small or 25% upfront.</p>
                        <a href="evillage-loan-apply.html">Apply for a loan</a>
                    </div>`;
                return;
            }

            // Plan + breakdown — recompute from the saved financing so the UI
            // is consistent even if the seed data shape predates the new plans.
            const plan   = active.plan || (active.financing && active.financing.plan) || 'small_small';
            const price  = (active.product && active.product.price_ngn) || (active.financing && active.financing.amount_ngn) || 0;
            const tenor  = (active.financing && active.financing.tenure_months) || 12;
            const q = plan === 'upfront_25'
                ? window.EvillageLoans.compute25Upfront(price, tenor)
                : window.EvillageLoans.computeSmallSmall(price, tenor);

            // Build a payment schedule. Treat existing receipts in
            // active.repayments (if present) as paid; the rest are upcoming.
            const receipts = Array.isArray(active.repayments) ? active.repayments : [];
            const schedule = [];
            const startDate = new Date(active.created_at || Date.now());
            for (let i = 1; i <= tenor; i++) {
                const due = new Date(startDate);
                due.setMonth(due.getMonth() + i);
                const receipt = receipts[i - 1] || null;
                const paid = !!(receipt && receipt.status === 'paid');
                schedule.push({
                    monthNum: i,
                    dueDate: due,
                    amount: q.monthly,
                    status: paid ? 'paid' : (i === (receipts.length + 1) ? 'due' : 'upcoming'),
                    paidOn: receipt && receipt.paid_at ? new Date(receipt.paid_at) : null,
                });
            }

            const paidCount    = schedule.filter((r) => r.status === 'paid').length;
            const paidTotal    = paidCount * q.monthly + (plan === 'upfront_25' ? (q.upfront + q.ncgc) : 0);
            const outstanding  = Math.max(0, q.total - paidTotal);
            const nextRow      = schedule.find((r) => r.status === 'due') || schedule.find((r) => r.status === 'upcoming');

            const planLabel = plan === 'small_small' ? 'Pay Small Small' : '25% Upfront';
            const collectionLine = plan === 'small_small'
                ? `Product released after month ${q.collectionMonth} once 50% paid`
                : `Product released on payment of upfront + NCGC`;

            shell.innerHTML = `
                <div class="panel">
                    <h2>${planLabel} · ${tenor} months</h2>
                    <p class="sub">${collectionLine}</p>

                    <div class="summary-grid">
                        <div class="summary-item">
                            <div class="summary-label">Monthly</div>
                            <div class="summary-value">${fmtNaira(q.monthly)}</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-label">Paid so far</div>
                            <div class="summary-value green">${fmtNaira(paidTotal)}</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-label">Outstanding</div>
                            <div class="summary-value amber">${fmtNaira(outstanding)}</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-label">Next payment</div>
                            <div class="summary-value">${nextRow ? formatDue(nextRow.dueDate) : '—'}</div>
                        </div>
                    </div>

                    <div style="margin-top: 14px; font-size: 12px; color: #6b7280;">
                        NCGC fee in this loan: <strong>${fmtNaira(q.ncgc)}</strong>
                        ${plan === 'upfront_25' ? `· Upfront paid: <strong>${fmtNaira(q.upfront)}</strong>` : ''}
                        · Total to pay: <strong>${fmtNaira(q.total)}</strong>
                    </div>
                </div>

                <div class="panel">
                    <h2>Payment schedule</h2>
                    <p class="sub">A checkmark drops on a month the moment your transfer lands in the collection account.</p>
                    <div class="schedule">
                        ${schedule.map(renderRow).join('')}
                    </div>
                </div>`;

            function renderRow(r) {
                const dateText = r.status === 'paid' && r.paidOn ? 'Paid · ' + r.paidOn.toLocaleDateString() : 'Due ' + r.dueDate.toLocaleDateString();
                const marker   = r.status === 'paid' ? '<i class="fas fa-check"></i>' :
                                 r.status === 'due'  ? '<i class="fas fa-clock"></i>' :
                                                       r.monthNum;
                return `
                    <div class="row ${r.status}">
                        <div class="marker">${marker}</div>
                        <div>
                            <div class="label">Month ${r.monthNum}</div>
                            <div class="meta">${dateText}</div>
                        </div>
                        <div class="amount">${fmtNaira(r.amount)}</div>
                    </div>`;
            }
            function formatDue(d) {
                return d.toLocaleDateString(undefined, { day: 'numeric', month: 'short' });
            }
        })();
    </script>
</body>
</html>
